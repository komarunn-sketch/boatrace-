function lookup(venue, course, diff) {
  var vt = VENUE_TABLES[venue] || DEFAULT_TABLES;
  var rows = vt[course] || DEFAULT_TABLES[course];
  for (var i=0; i<rows.length; i++) {
    var row = rows[i];
    if (diff >= row[0] && diff < row[1]) return {w1:row[2],w2:row[3],w3:row[4],top3:row[5]};
  }
  return {w1:0,w2:0,w3:0,top3:0};
}

function parseCSVFull(text){
  var rows=[],cur="",inQ=false,row=[];
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur);cur="";}
    else if((c==='\n'||c==='\r')&&!inQ){
      if(c==='\r'&&text[i+1]==='\n')i++;
      row.push(cur);cur="";
      for(var k=0;k<row.length;k++){if(row[k].trim()){rows.push(row.slice());break;}}
      row=[];
    } else cur+=c;
  }
  if(cur||row.length){row.push(cur);for(var k=0;k<row.length;k++){if(row[k].trim()){rows.push(row.slice());break;}}}
  return rows;
}

  function pct(s){var v=(s||"").split("\n")[0].replace(/%/,"").trim();if(v==="-"||v==="")return null;var n=parseFloat(v);return isNaN(n)?null:n;}
  function pi(s){var n=parseInt(s);return isNaN(n)?null:n;}
  function g(arr,i){return arr[i]||"";}

  var racerClass=[];
  for(var i=2;i<=7;i++){var v=ps(g(d,i));if(v)racerClass.push(v);}

  var stTable={
    "今期":    [10,11,12,13,14,15].map(function(i){return pf(g(d,i));}),
    "直近3ヶ月":[17,18,19,20,21,22].map(function(i){return pf(g(d,i));}),
    "直近1ヶ月":[24,25,26,27,28,29].map(function(i){return pf(g(d,i));}),
    "初日":    [31,32,33,34,35,36].map(function(i){return pf(g(d,i));}),
    "最終日":  [38,39,40,41,42,43].map(function(i){return pf(g(d,i));}),
    "ナイター":[45,46,47,48,49,50].map(function(i){return pf(g(d,i));}),
    "F持":     [52,53,54,55,56,57].map(function(i){return pf(g(d,i));}),
  };
  var sts={1:"",2:"",3:"",4:"",5:"",6:""};
  var fSts={1:"",2:"",3:"",4:"",5:"",6:""};
  var sk=stTable["今期"];
  if(sk)for(var b=1;b<=6;b++){var v=sk[b-1];if(v!=null&&v>=0&&v<=0.6)sts[b]=Math.min(0.4,v).toFixed(2);}
  var sf=stTable["F持"];
  if(sf)for(var b=1;b<=6;b++){var v=sf[b-1];if(v!=null&&v>=0&&v<=0.6)fSts[b]=Math.min(0.4,v).toFixed(2);}

  var stScore={
    rate:[68,69,70,71,72,73].map(function(i){return pf(g(d,i));}),
    rank:[75,76,77,78,79,80].map(function(i){return pi(g(d,i));}),
  };

  // ★ 修正: CAT_BASEを+1ずつ補正（例: 今期 83→84, 直近6ヶ月 90→91, ...）
  var CATS=["今期","直近6ヶ月","直近3ヶ月","直近1ヶ月","当地","一般戦","SG/G1","直近1年"];
  var CAT_BASE=[[84],[91],[98],[105],[112],[119],[126],[133]];
  var win1raw={},ren2raw={},ren3raw={};
  for(var ci=0;ci<CATS.length;ci++){
    var cat=CATS[ci],off=CAT_BASE[ci][0];
    win1raw[cat]=[0,1,2,3,4,5].map(function(j){return pct(g(d,off+j));});
    ren2raw[cat]=[0,1,2,3,4,5].map(function(j){return pct(g(d,off+57+j));});
    ren3raw[cat]=[0,1,2,3,4,5].map(function(j){return pct(g(d,off+114+j));});
  }
  function adjS(sec,base){
    var o={};
    for(var k in sec){
      var r=sec[k],bb=base[k];
      if(!r){o[k]=null;continue;}
      o[k]=r.map(function(v,i){var w=bb?bb[i]:null;return(v!=null&&w!=null)?Math.max(0,+(v-w).toFixed(1)):v;});
    }
    return o;
  }
  function cleanS(sec){
    var o={};
    for(var k in sec){
      var a=sec[k];
      o[k]=a?a.map(function(v){return(v!=null&&v>=0&&v<=100)?v:null;}):null;
    }
    return o;
  }
  var ren2adj=adjS(ren2raw,win1raw);
  var ren3adj=adjS(ren3raw,ren2raw);
  var racerStats={win1:cleanS(win1raw),ren2:cleanS(ren2adj),ren3:cleanS(ren3adj)};

  var racerRaceCount=[91,92,93,94,95,96].map(function(i){
    var m=(g(d,i)).match(/\((\d+)\)/);return m?parseInt(m[1]):null;
  });

  function pKim(base){
    return {
      nige:pf(g(d,base)),nigashi:pf(g(d,base+2)),sasare:pf(g(d,base+4)),
      sashi:[1,2,3,4,5].map(function(j){return pf(g(d,base+5+j));}),
      makurare:pf(g(d,base+12)),
      makuri:[1,2,3,4,5].map(function(j){return pf(g(d,base+13+j));}),
      makuraresashi:pf(g(d,base+20)),
      makurizashi:[1,2,3,4,5].map(function(j){return pf(g(d,base+21+j));}),
    };
  }
  var kimari={"直近6ヶ月":pKim(254),"直近1年":pKim(283)};

  var nigeSim={
    win1:pf(g(d,313)),nigeRate:pf(g(d,315)),
    second:[317,318,319,320,321].map(function(i){return pf(g(d,i));}),
    third:[323,324,325,326,327].map(function(i){return pf(g(d,i));}),
    deme:[336,338,340,342,344].map(function(i){return pf(g(d,i));}),
  };

  function pkc(base){
    return [0,1,2,3,4,5].map(function(j){
      var v=(g(d,base+j)).trim();
      return(v==="-"||v==="")?null:(parseInt(v)||null);
    });
  }
  var kimariCount={nige:pkc(349),sashi:pkc(356),makuri:pkc(363),makurizashi:pkc(370)};

  var motors={};
  for(var b=1;b<=6;b++){
    motors[b]={
      rate:pf(g(d,392+b)),
      ren2:pf(g(d,406+b)),
      ren3:pf(g(d,413+b)),
    };
  }

  var base=emptyRace();
  base.racerClass=racerClass.length===6?racerClass:null;
  base.stTable=stTable;base.stScore=stScore;base.sts=sts;base.fSts=fSts;
  base.racerStats=racerStats;base.racerRaceCount=racerRaceCount;
  base.kimari=kimari;base.kimariCount=kimariCount;base.nigeSim=nigeSim;
  base.motors=motors;base.pMsg="✓ CSVから読み込みました";
  return base;
}

function App() {
  const [venue,setVenue]=useState("");
  const [racerCat,setRacerCat]=useState("直近1年");
  const [stPeriod,setStPeriod]=useState("今期");
  const [kimariPeriod,setKimariPeriod]=useState("直近6ヶ月");
  const [curRace,setCurRace]=useState(1);
  const [races,setRaces]=useState(initRaces);
  const [openPanel,setOpenPanel]=useState(null);
  const [csvMsg,setCsvMsg]=useState("");
  const [csvDebug,setCsvDebug]=useState(null);

  const rd=races[rk(venue,curRace)]||emptyRace();
  const updateRd=useCallback(function(fn){
    if(!venue)return;
    var k=rk(venue,curRace);
    setRaces(function(prev){
      var next=Object.assign({},prev);
      next[k]=fn(prev[k]||emptyRace());
      return next;
    });
  },[venue,curRace]);

  function handleCSV(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var allRows=parseCSVFull(ev.target.result);
        if(allRows.length<2){setCsvMsg("データ行が見つかりません");return;}
        var headers=allRows[0];
        var idxV=headers.indexOf("場所3");
        var imported=0,updated={},skipLog={};
        for(var ri=1;ri<allRows.length;ri++){
          var row=allRows[ri];
          if(row.length<10){skipLog["列数不足"]=(skipLog["列数不足"]||0)+1;continue;}
          var vname=(row[idxV]||"").trim();
          if(!vname||!VENUES[vname]){skipLog["場名:"+vname]=(skipLog["場名:"+vname]||0)+1;continue;}
          var rtxt=(row[5]||"").trim();
          var rm=rtxt.match(/^(\d+)R/);
          var rnum=rm?parseInt(rm[1]):null;
          if(!rnum||rnum<1||rnum>12){skipLog["raceNo不明"]=(skipLog["raceNo不明"]||0)+1;continue;}
          try{
            var parsed=parseRowByIndex(row.slice(5));
            if(!updated[vname])updated[vname]={};
            updated[vname][rnum]=parsed;
            imported++;
          }catch(err){
            var ek="エラー:"+err.message.slice(0,30);
            skipLog[ek]=(skipLog[ek]||0)+1;
          }
        }
        if(imported===0){setCsvMsg("取り込めませんでした");setCsvDebug({log:JSON.stringify(skipLog)});return;}
        setRaces(function(prev){
          var next=Object.assign({},prev);
          var vkeys=Object.keys(updated);
          for(var i=0;i<vkeys.length;i++){
            var v=vkeys[i];
            var rnums=Object.keys(updated[v]);
            for(var j=0;j<rnums.length;j++){
              next[rk(v,rnums[j])]=updated[v][rnums[j]];
            }
          }
          return next;
        });
        var fv=Object.keys(updated)[0];
        if(fv){setVenue(fv);setCurRace(1);}
        setCsvDebug(null);
        setCsvMsg("✓ "+Object.keys(updated).length+"場 "+imported+"レース分を取り込みました");
      }catch(err){setCsvMsg("解析失敗: "+err.message);}
      e.target.value="";
    };
    reader.readAsText(file,"UTF-8");
  }

  function makeRR(text){
    var cursor=0;
    return function(label,opts){
      var allowDash=opts&&opts.allowDash;
      var i=text.indexOf(label,cursor);if(i===-1)return null;
      var pos=i+label.length,seg=text.slice(pos);
      var re=allowDash?/-?(?:\d+\.\d+|\.\d+)|[-−ー]|\d+/g:/-?(?:\d+\.\d+|\.\d+|\d+)/g;
      var vals=[],m,lastEnd=0;
      while(vals.length<6&&(m=re.exec(seg))){
        if(allowDash&&/^[-−ー]$/.test(m[0]))vals.push(null);else vals.push(Number(m[0]));
        lastEnd=re.lastIndex;
      }
      if(vals.length<6)return null;
      cursor=pos+lastEnd;return vals;
    };
  }

  function applyStTbl(table,period,cur){
    var row=table[period],ns=Object.assign({},cur.sts);
    if(row)for(var b=1;b<=6;b++){var v=row[b-1];if(v!=null&&v>=0&&v<=0.6)ns[b]=Math.min(0.4,v).toFixed(2);}
    var nf=Object.assign({},cur.fSts),f=table["F持"];
    if(f)for(var b=1;b<=6;b++){var v=f[b-1];nf[b]=(v!=null&&v>=0&&v<=0.6)?Math.min(0.4,v).toFixed(2):"";}
    return{sts:ns,fSts:nf};
  }

  function parseAll(){
    var text=rd.pText,results=[],newData={};
    try{
      var table={};
      for(var i=0;i<STPS.length;i++){
        var lb=STPS[i],idx=text.indexOf(lb);
        if(idx===-1){table[lb]=null;continue;}
        var seg=text.slice(idx+lb.length),re=/\d+\.\d+|\.\d+|[-−ー]/g,vals=[],m;
        while(vals.length<6&&(m=re.exec(seg)))vals.push(/^[-−ー]$/.test(m[0])?null:Number(m[0]));
        table[lb]=vals.length===6?vals:null;
      }
      var fi=text.indexOf("F持");
      if(fi!==-1){var seg=text.slice(fi+2),re=/\d+\.\d+|\.\d+|[-−ー]/g,vals=[],m;while(vals.length<6&&(m=re.exec(seg)))vals.push(/^[-−ー]$/.test(m[0])?null:Number(m[0]));table["F持"]=vals.length===6?vals:null;}
      var hasAny=false;for(var i=0;i<STPS.length;i++){if(table[STPS[i]])hasAny=true;}
      if(hasAny){var ap=applyStTbl(table,stPeriod,rd);newData.stTable=table;newData.sts=ap.sts;newData.fSts=ap.fSts;results.push("平均ST");}
    }catch(e){}
    try{
      var rr=makeRR(text);rr("番号");rr("ランク");rr("貢献P");
      var rateRow=rr("勝率"),ren2Row=rr("2連対率"),ren3Row=rr("3連対率");
      if(rateRow||ren2Row){
        var nm={};
        for(var b=1;b<=6;b++){var i=b-1;nm[b]={rate:rateRow&&rateRow[i]>=0&&rateRow[i]<=10?rateRow[i]:null,ren2:ren2Row&&ren2Row[i]>=0&&ren2Row[i]<=100?ren2Row[i]:null,ren3:ren3Row&&ren3Row[i]>=0&&ren3Row[i]<=100?ren3Row[i]:null};}
        newData.motors=nm;results.push("モーター");
      }
    }catch(e){}
    updateRd(function(prev){
      var n=Object.assign({},prev,newData);
      n.pMsg=results.length===0?"データが見つかりませんでした":"✓ "+results.join("・")+"を読み取りました";
      return n;
    });
  }

  function parseTenji(){
    var text=rd.tenjiText;
    try{
      var rr=makeRR(text);
      var shinnyu=rr("進入",{allowDash:true});
      var tenjiRow=rr("展示",{allowDash:true});
      var isshuRow=rr("周回",{allowDash:true});
      var mawariRow=rr("周り足",{allowDash:true});
      var chokusenRow=rr("直線",{allowDash:true});
      rr("ST",{allowDash:true});
      var weightRow=rr("体重",{allowDash:true});
      rr("調整重量",{allowDash:true});
      var tiltRow=rr("チルト",{allowDash:true});
      var tiltSet=TILT_OPT.map(Number);
      var ni=Object.assign({},rd.inputs),nt=Object.assign({},rd.tilts),nw=Object.assign({},rd.weights),nc=Object.assign({},rd.courses);
      if(tenjiRow&&isshuRow&&mawariRow){
        for(var b=1;b<=6;b++){
          var i=b-1;
          ni[b]={
            tenji:tenjiRow[i]>=5.5&&tenjiRow[i]<=7.8?String(tenjiRow[i]):rd.inputs[b].tenji,
            isshu:isshuRow[i]>=15&&isshuRow[i]<=45?String(isshuRow[i]):rd.inputs[b].isshu,
            mawari:mawariRow[i]>=4.5&&mawariRow[i]<=15?String(mawariRow[i]):rd.inputs[b].mawari,
            chokusen:chokusenRow&&chokusenRow[i]!=null&&chokusenRow[i]>=5.5&&chokusenRow[i]<=8.5?String(chokusenRow[i]):rd.inputs[b].chokusen,
          };
        }
        if(shinnyu&&shinnyu.every(function(v){return v>=1&&v<=6&&Number.isInteger(v);}))
          for(var b=1;b<=6;b++)nc[b]=shinnyu[b-1];
        if(weightRow)for(var b=1;b<=6;b++){var v=weightRow[b-1];if(v&&v>=40&&v<=70)nw[b]=String(v);}
        if(tiltRow)for(var b=1;b<=6;b++){if(tiltRow[b-1]==null)continue;var s=(Math.round(tiltRow[b-1]*2)/2).toFixed(1);if(tiltSet.indexOf(Number(s))>=0)nt[b]=s;}
        updateRd(function(prev){var n=Object.assign({},prev);n.inputs=ni;n.tilts=nt;n.weights=nw;n.courses=nc;n.tenjiMsg="✓ 6艇分を読み取りました";return n;});
        return;
      }
      updateRd(function(prev){var n=Object.assign({},prev);n.tenjiMsg="タイムが見つかりません";return n;});
    }catch(e){
      updateRd(function(prev){var n=Object.assign({},prev);n.tenjiMsg="解析に失敗しました";return n;});
    }
  }

  const result=useMemo(function(){
    if(!venue)return null;
    var vw=VW[venue]||{tenji:1,isshu:1,mawari:1,chokusen:1};
    var sums={};
    var hasAnyTime=false;
    for(var b=1;b<=6;b++){
      var inp=rd.inputs[b];
      var vals={tenji:parseFloat(inp.tenji),isshu:parseFloat(inp.isshu),mawari:parseFloat(inp.mawari),chokusen:parseFloat(inp.chokusen)};
      var sum=0,valid=true;
      var ks=["tenji","isshu","mawari","chokusen"];
      for(var ki=0;ki<ks.length;ki++){
        var kk=ks[ki];
        if(vw[kk]===0)continue;
        if(isNaN(vals[kk])){valid=false;break;}
        sum+=vals[kk]*vw[kk];
      }
      sums[b]=valid?sum:null;
      if(valid)hasAnyTime=true;
    }
    var avg=null;
    if(hasAnyTime){
      var validSums=[];
      for(var b=1;b<=6;b++){if(sums[b]!=null)validSums.push(sums[b]);}
      if(validSums.length===6){
        var total=0;for(var i=0;i<validSums.length;i++)total+=validSums[i];
        avg=total/6;
      }
    }
    var base=VENUES[venue],rows=[];
    for(var b=1;b<=6;b++){
      var course=rd.courses[b];
      var baseRate=base[course-1];
      var windAdj=+(WIND[rd.wind][course-1]-WIND["無風"][course-1]).toFixed(1);
      var diff=0,adj={w1:0,w2:0,w3:0,top3:0};
      if(avg!=null&&sums[b]!=null){
        diff=avg-sums[b];
        adj=lookup(venue,course,diff);
      }
      var rs=rd.racerStats;
      var rW1=rs&&rs.win1&&rs.win1[racerCat]?rs.win1[racerCat][b-1]:null;
      var rR2=rs&&rs.ren2&&rs.ren2[racerCat]?rs.ren2[racerCat][b-1]:null;
      var rR3=rs&&rs.ren3&&rs.ren3[racerCat]?rs.ren3[racerCat][b-1]:null;
      rows.push({
        boat:b,course:course,
        sum:sums[b],diff:diff,
        baseRate:baseRate,windAdj:windAdj,
        final1:baseRate+adj.w1+windAdj,
        racerR1final:rW1!=null?rW1+adj.w1:null,
        racerR2final:rR2!=null?rR2+adj.w1+adj.w2:null,
        racerR3final:rR3!=null?rR3+adj.top3:null,
        w1:adj.w1,w2:adj.w2,w3:adj.w3,top3:adj.top3,
        hasTime:sums[b]!=null,
      });
    }
    var hasRacer=false;
    for(var i=0;i<rows.length;i++){if(rows[i].racerR1final!=null||rows[i].racerR3final!=null)hasRacer=true;}
    var sorted=null;
    if(hasRacer){
      sorted=rows.slice().sort(function(a,b){
        var sa=a.racerR1final!=null?a.racerR1final:(a.racerR3final!=null?a.racerR3final-100:-999);
        var sb=b.racerR1final!=null?b.racerR1final:(b.racerR3final!=null?b.racerR3final-100:-999);
        return sb-sa;
      });
    }
    var cs=Object.values(rd.courses);var uniq={};for(var i=0;i<cs.length;i++)uniq[cs[i]]=1;
    var dup=Object.keys(uniq).length!==6;
    return{avg:avg,rows:rows,racerRank:sorted,dup:dup,hasTime:hasAnyTime};
  },[rd.inputs,rd.courses,rd.wind,rd.racerStats,venue,racerCat]);

  const kimariByBoat=useMemo(function(){
    if(!rd.kimariCount||!result)return null;
    return result.rows.map(function(r){
      var ci=r.course-1;
      var kc=rd.kimariCount;
      var nige=r.course===1?(kc.nige?kc.nige[ci]:null):null;
      var sashi=r.course!==1?(kc.sashi?kc.sashi[ci]:null):null;
      var makuri=r.course!==1?(kc.makuri?kc.makuri[ci]:null):null;
      var mkz=r.course!==1?(kc.makurizashi?kc.makurizashi[ci]:null):null;
      var total=[nige,sashi,makuri,mkz].reduce(function(s,v){return s+(v!=null?v:0);},0);
      return{boat:r.boat,course:r.course,nige:nige,sashi:sashi,makuri:makuri,makurizashi:mkz,total:total};
    });
  },[rd.kimariCount,result]);

  const slit=useMemo(function(){
    var rows=[];
    for(var b=1;b<=6;b++){
      if(rd.sts[b]==="")return null;
      var st=parseFloat(rd.sts[b]),mark=null;
      if(rd.fHold[b]){if(rd.fSts[b]!==""){st=parseFloat(rd.fSts[b]);mark="F";}else mark="F?";}
      rows.push({boat:b,course:rd.courses[b],st:st,mark:mark});
    }
    return rows.sort(function(a,b){return a.course-b.course;});
  },[rd.sts,rd.fHold,rd.fSts,rd.courses]);

  const aiEval=useMemo(function(){
    if(!result)return null;
    var rows=result.rows;
    var effSt={};
    for(var b=1;b<=6;b++){if(rd.sts[b]!=="")effSt[b]=rd.fHold[b]&&rd.fSts[b]!==""?parseFloat(rd.fSts[b]):parseFloat(rd.sts[b]);}
    var stVals=Object.values(effSt);
    var stAvg=stVals.length>=2?stVals.reduce(function(a,c){return a+c;},0)/stVals.length:null;
    var motorVals=[];
    for(var b=1;b<=6;b++){if(rd.motors[b]&&rd.motors[b].ren2!=null)motorVals.push(rd.motors[b].ren2);}
    var motorAvg=motorVals.length>=2?motorVals.reduce(function(a,c){return a+c;},0)/motorVals.length:null;
    var motorEntries=[];
    for(var b=1;b<=6;b++){if(rd.motors[b]&&rd.motors[b].ren2!=null)motorEntries.push([b,rd.motors[b].ren2]);}
    motorEntries.sort(function(a,b){return b[1]-a[1];});
    var motorTop2={};for(var i=0;i<Math.min(2,motorEntries.length);i++)motorTop2[motorEntries[i][0]]=true;

    var r1Vals=[],r3Vals=[];
    for(var b=1;b<=6;b++){
      var rr=rows.filter(function(x){return x.boat===b;})[0];
      if(rr&&rr.racerR1final!=null)r1Vals.push(rr.racerR1final);
      if(rr&&rr.racerR3final!=null)r3Vals.push(rr.racerR3final);
    }
    var r1Avg=r1Vals.length>=2?r1Vals.reduce(function(a,c){return a+c;},0)/r1Vals.length:null;
    var r3Avg=r3Vals.length>=2?r3Vals.reduce(function(a,c){return a+c;},0)/r3Vals.length:null;

    var evals=rows.map(function(r){
      var m=rd.motors[r.boat];
      var crit={
        time:r.diff>=0.1,
        motor:m&&(m.ren2!=null||m.ren3!=null)?(motorTop2[r.boat]||(m.ren3!=null&&m.ren3>=60)):null,
        wind:rd.wind==="無風"?null:r.windAdj>=0.5,
      };
      var goods=0;var critVals=Object.values(crit);for(var i=0;i<critVals.length;i++)if(critVals[i]===true)goods++;
      var mark=goods>=2?"◎":goods===1?"○":"△";
      var warns=[],plus=[];
      if(rd.fHold[r.boat])warns.push("F持ち注意");
      if(stAvg!=null&&effSt[r.boat]!=null&&effSt[r.boat]-stAvg>=0.03)warns.push("ST遅め注意");
      if(rd.tilts[r.boat]!==""&&parseFloat(rd.tilts[r.boat])>=1.0)warns.push("チルト跳ね・伸び警戒");
      if(stAvg!=null&&effSt[r.boat]!=null&&stAvg-effSt[r.boat]>=0.03)plus.push("スリット先行候補");
      if(r3Avg!=null&&r.racerR3final!=null&&r.racerR3final-r3Avg<=-5)warns.push("3連対率低く紐でも過信禁物");
      var score=goods*10+(r.racerR1final!=null&&r1Avg!=null?(r.racerR1final-r1Avg)*0.3:0)+r.diff*5+(m&&m.ren2!=null&&motorAvg!=null?(m.ren2-motorAvg)*0.1:0)+r.windAdj*0.5+r.final1*0.05;
      return Object.assign({},r,{crit:crit,goods:goods,mark:mark,warns:warns,plus:plus,score:score});
    });

    var km=rd.kimari?rd.kimari[kimariPeriod]:null;
    var b1=evals.filter(function(r){return r.boat===1;})[0];
    if(km&&b1){
      if(km.nige!=null&&km.nige>=40)b1.plus.push("逃げ率"+km.nige+"%と高水準");
      else if(km.nige!=null&&km.nige<=25)b1.warns.push("逃げ率"+km.nige+"%と低調");
      var types=[
        {key:"sashi",name:"差し",def:km.sasare,defName:"差され"},
        {key:"makuri",name:"捲り",def:km.makurare,defName:"捲られ"},
        {key:"makurizashi",name:"捲り差し",def:km.makuraresashi,defName:"捲られ差"},
      ];
      for(var ti=0;ti<types.length;ti++){
        var t=types[ti];
        var arr=km[t.key];
        if(!arr||t.def==null)continue;
        var mb=0,mv=-1;
        for(var ai=0;ai<arr.length;ai++){var v=arr[ai];if(v!=null&&v>mv){mv=v;mb=ai+2;}}
        var atk=evals.filter(function(r){return r.boat===mb;})[0];
        if(t.def>=15&&mv>=15){
          b1.warns.push(t.defName+t.def+"%×"+mb+"号艇の"+t.name+mv+"%で要警戒");
          if(atk)atk.plus.push(t.name+mv+"%で1号艇を脅かす");
        }
      }
    }

    // 各艇の予想1着率に応じたコメント（イン逃げ崩れ警戒／頭有り）
    if(b1&&b1.racerR1final!=null&&b1.racerR1final<50){
      var nigeRate=km&&km.nige!=null?km.nige:null;
      b1.warns.push("逃げ率"+(nigeRate!=null?nigeRate+"%":"低調")+"イン飛び注意");
    }
    var headThresholds={2:20,3:20,4:15,5:15,6:10};
    for(var hb=2;hb<=6;hb++){
      var rEval=evals.filter(function(r){return r.boat===hb;})[0];
      if(rEval&&rEval.racerR1final!=null&&rEval.racerR1final>=headThresholds[hb]){
        rEval.plus.push("1着率"+fmt(rEval.racerR1final,1)+"%　頭有り");
      }
    }

    var ranked=evals.slice().sort(function(a,b){return b.score-a.score;});
    for(var i=0;i<ranked.length;i++)ranked[i].rankPos=i+1;
    var maxG=0;for(var i=0;i<evals.length;i++)if(evals[i].goods>maxG)maxG=evals[i].goods;
    var topN=0;for(var i=0;i<evals.length;i++)if(evals[i].goods===maxG)topN++;
    var badge,badgeColor;
    if(maxG>=2&&topN===1){badge="本命";badgeColor="#2e9e6b";}
    else if(maxG>=2){badge="やや本命";badgeColor="#5a9e2e";}
    else{badge="混戦・波乱含み";badgeColor="#b3463f";}
    return{ranked:ranked,badge:badge,badgeColor:badgeColor};
  },[result,rd.sts,rd.fHold,rd.fSts,rd.motors,rd.tilts,rd.wind,rd.kimari,kimariPeriod]);

                      <span style={{width:22,fontSize:10,color:"#7da3c8",flexShrink:0}}>{r.course}C</span>
                      <div style={{flex:1,position:"relative",height:26,marginRight:56}}>
                        <div style={{position:"absolute",left:0,top:"50%",width:(p*100)+"%",height:3,transform:"translateY(-50%)",background:"#2c4762",borderRadius:2}}/>
                        <div style={{position:"absolute",top:"50%",left:"calc("+(p*100)+"% - 13px)",transform:"translateY(-50%)",display:"flex",alignItems:"center",gap:3}}>
                          <LB b={r.boat}/>
                          {r.mark&&<span style={{fontSize:9,fontWeight:800,padding:"1px 4px",borderRadius:4,background:r.mark==="F"?"#b3463f":"#6b5a1d",color:"#fff"}}>{r.mark}</span>}
                          {rd.tilts[r.boat]!==""&&parseFloat(rd.tilts[r.boat])>=1.0&&<span>⚡</span>}
                        </div>
                      </div>
                      <span style={{width:34,fontSize:11,color:"#9db5cc",textAlign:"right",flexShrink:0}}>.{r.st.toFixed(2).split(".")[1]}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        <div style={{marginBottom:24}}>
          <div style={{fontSize:11,letterSpacing:"0.2em",color:"#7da3c8",marginBottom:8}}>展示タイム一覧</div>
          <div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{color:"#7da3c8",fontSize:11}}>
                  {["艇","周回","周り足","直線","展示"].map(function(h){return <th key={h} style={{padding:"6px 10px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>{h}</th>;})}
                </tr>
              </thead>
              <tbody>
                {(function(){
                  var keys=["isshu","mawari","chokusen","tenji"];
                  var ranks=keys.map(function(k){
                    var vals=[1,2,3,4,5,6].map(function(b){return parseFloat(rd.inputs[b][k]);}).filter(function(v){return !isNaN(v);});
                    var s=[...new Set(vals)].sort(function(a,b){return a-b;});
                    return{first:s[0],second:s[1]};
                  });
                  return [1,2,3,4,5,6].map(function(b){
                    var inp=rd.inputs[b];
                    var isEmpty=["tenji","isshu","mawari","chokusen"].every(function(k){return inp[k]==="";});
                    return (
                      <tr key={b} style={{borderBottom:"1px solid #1d3149",opacity:isEmpty?0.35:1}}>
                        <td style={{padding:"8px 10px",textAlign:"center"}}><LB b={b}/></td>
                        {[inp.isshu,inp.mawari,inp.chokusen,inp.tenji].map(function(v,i){
                          var num=parseFloat(v),isF=!isNaN(num)&&num===ranks[i].first,isS=!isNaN(num)&&num===ranks[i].second;
                          return <td key={i} style={{padding:"6px 10px",textAlign:"center"}}><span style={{display:"inline-block",minWidth:48,padding:"4px 8px",borderRadius:6,background:isF?"rgba(217,48,37,0.55)":isS?"rgba(249,197,19,0.35)":"transparent",fontWeight:700,color:isF||isS?"#fff":v?"#fff":"#4a5d70"}}>{v||"―"}</span></td>;
                        })}
                      </tr>
                    );
                  });
                })()}
              </tbody>
            </table>
          </div>
        </div>

        {!venue?(
          <div style={{textAlign:"center",padding:"28px 16px",borderRadius:10,border:"1px dashed #2c4762",color:"#7da3c8",fontSize:13}}>
            まず開催場を選択してください
          </div>
        ):!result?(
          <div style={{textAlign:"center",padding:"28px 16px",borderRadius:10,border:"1px dashed #2c4762",color:"#7da3c8",fontSize:13}}>
            データを読み込んでください
          </div>
        ):(
          <div>
            <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap",marginBottom:10}}>
              <span style={{fontSize:19,fontWeight:800,color:"#fff"}}>{curRace}R {venue}{result.avg!=null?"（平均: "+fmt(result.avg)+"）":""}</span>
              <span style={{fontSize:12,color:"#9db5cc"}}>{rd.wind}</span>
              {aiEval&&<span style={{fontSize:11,fontWeight:800,padding:"4px 10px",borderRadius:999,background:aiEval.badgeColor,color:"#fff"}}>{aiEval.badge}</span>}
            </div>
            {result.dup&&<div style={{fontSize:12,color:"#f9c513",background:"#2e2710",border:"1px solid #6b5a1d",borderRadius:8,padding:"8px 10px",marginBottom:12}}>⚠ 同じコースに複数の艇が入っています。</div>}

            {(result.racerRank||kimariByBoat)&&(
              <div style={{marginBottom:24}}>
                <div style={{fontSize:13,fontWeight:800,color:"#fff",marginBottom:8}}>
                  予想着率（枠別成績＋補正）{kimariByBoat&&<span style={{fontSize:11,color:"#5dd39e",fontWeight:400,marginLeft:6}}>＋ 決まり手数</span>}
                </div>
                {rd.racerStats!=null&&(
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
                    {RCATS.map(function(cat){
                      var active=racerCat===cat;
                      var hasData=rd.racerStats&&rd.racerStats.win1&&rd.racerStats.win1[cat]&&rd.racerStats.win1[cat].some(function(v){return v!=null;});
                      return (
                        <button key={cat} onClick={function(){setRacerCat(cat);}} style={{padding:"5px 10px",fontSize:11,fontWeight:active?800:500,borderRadius:6,cursor:"pointer",background:active?"#3d7ab8":"#0e1b2c",color:active?"#fff":hasData?"#9db5cc":"#3a4f63",border:active?"1px solid #5a87b8":"1px solid #2c4762",opacity:hasData?1:0.5}}>
                          {cat}
                        </button>
                      );
                    })}
                  </div>
                )}
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{color:"#7da3c8",fontSize:11}}>
                        <th style={{padding:"6px 8px",textAlign:"left",borderBottom:"1px solid #2c4762"}}>艇</th>
                        {kimariByBoat&&<th style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>合計／出走数</th>}
                        {rd.stScore&&<th style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>得点率</th>}
                        {rd.stScore&&rd.stScore.rank&&<th style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>順位</th>}
                        {result.racerRank&&<th style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>予想1着率</th>}
                        {result.racerRank&&<th style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>予想2着率</th>}
                        {result.racerRank&&<th style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>予想3着率</th>}
                        {kimariByBoat&&<th style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>逃げ</th>}
                        {kimariByBoat&&<th style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>差し</th>}
                        {kimariByBoat&&<th style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>捲り</th>}
                        {kimariByBoat&&<th style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #2c4762"}}>捲差</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {result.rows.map(function(r){
                        var kc=kimariByBoat?kimariByBoat.filter(function(k){return k.boat===r.boat;})[0]:null;
                        var rc=rd.racerRaceCount?rd.racerRaceCount[r.boat-1]:null;
                        var nc=kc?kc.total:null;
                        function numC(v){return <td style={{padding:"7px 8px",textAlign:"center",color:v!=null?"#c8d8e8":"#4a5d70"}}>{v!=null?v:"―"}</td>;}
                        function pctC(v){return <td style={{padding:"7px 8px",textAlign:"center",fontWeight:600,color:v!=null?(v>=0?"#5dd39e":"#ff8a80"):"#4a5d70"}}>{v!=null?(fmt(v,1)+"%"):"―"}</td>;}
                        return (
                          <tr key={r.boat} style={{borderBottom:"1px solid #1d3149"}}>
                            <td style={{padding:"7px 8px"}}>
                              <div style={{display:"flex",alignItems:"center",gap:4}}>
                                <LB b={r.boat}/>
                                {r.course!==r.boat&&<span style={{fontSize:10,color:"#f9c513"}}>{r.course}C</span>}
                                {rd.racerClass&&<span style={{fontSize:10,fontWeight:700,color:rd.racerClass[r.boat-1]==="A1"?"#f9c513":rd.racerClass[r.boat-1]==="A2"?"#5dd39e":"#9db5cc"}}>{rd.racerClass[r.boat-1]}</span>}
                              </div>
                            </td>
                            {kimariByBoat&&<td style={{padding:"7px 8px",textAlign:"center",fontWeight:700,color:"#fff"}}>{nc!=null?nc:"―"}<span style={{color:"#7da3c8",fontWeight:400}}>/{rc!=null?rc:"-"}</span></td>}
                            {rd.stScore&&numC(rd.stScore.rate[r.boat-1])}
                            {rd.stScore&&rd.stScore.rank&&<td style={{padding:"7px 8px",textAlign:"center",color:"#9db5cc"}}>{rd.stScore.rank[r.boat-1]!=null?rd.stScore.rank[r.boat-1]+"位":"―"}</td>}
                            {result.racerRank&&pctC(r.racerR1final)}
                            {result.racerRank&&pctC(r.racerR2final)}
                            {result.racerRank&&pctC(r.racerR3final)}
                            {kimariByBoat&&numC(kc?kc.nige:null)}
                            {kimariByBoat&&numC(kc?kc.sashi:null)}
                            {kimariByBoat&&numC(kc?kc.makuri:null)}
                            {kimariByBoat&&numC(kc?kc.makurizashi:null)}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            <div style={{marginBottom:26}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{color:"#7da3c8",fontSize:11}}>
                    {["艇","1着補正","2着補正","3着補正","3連補正","合計","差"].map(function(h,i){return <th key={h} style={{padding:"6px 8px",textAlign:i===0?"left":"center",borderBottom:"1px solid #2c4762"}}>{h}</th>;})}
                  </tr>
                </thead>
                <tbody>
                  {result.rows.map(function(r){
                    return (
                      <tr key={r.boat} style={{borderBottom:"1px solid #1d3149"}}>
                        <td style={{padding:"9px 8px"}}><LB b={r.boat}/>{r.course!==r.boat&&<span style={{fontSize:10,color:"#f9c513",marginLeft:4}}>{r.course}C</span>}</td>
                        <td style={{padding:"9px 6px",textAlign:"center"}}>{pill(r.w1)}</td>
                        <td style={{padding:"9px 6px",textAlign:"center"}}>{pill(r.w2)}</td>
                        <td style={{padding:"9px 6px",textAlign:"center"}}>{pill(r.w3)}</td>
                        <td style={{padding:"9px 6px",textAlign:"center"}}>{pill(r.top3)}</td>
                        <td style={{padding:"9px 8px",textAlign:"center",fontWeight:800,color:"#fff"}}>{r.sum!=null?fmt(r.sum):"―"}</td>
                        <td style={{padding:"9px 8px",textAlign:"center",fontWeight:800,color:r.diff>0?"#5dd39e":r.diff<0?"#ff8a80":"#9db5cc"}}>{r.hasTime?(r.diff>0?"+":"")+fmt(r.diff):"―"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div style={{fontSize:11,letterSpacing:"0.2em",color:"#7da3c8",marginBottom:8}}>場平均で見る1着率</div>
            <div style={{display:"grid",gap:6,marginBottom:28}}>
              {result.rows.slice().sort(function(a,b){return(b.baseRate+b.windAdj)-(a.baseRate+a.windAdj);}).map(function(r,i){
                var v=r.baseRate+r.windAdj;
                var maxV=Math.max.apply(null,result.rows.map(function(x){return x.baseRate+x.windAdj;}));
                return (
                  <div key={r.boat} style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{width:18,fontSize:12,color:"#7da3c8"}}>{i+1}.</span>
                    <LB b={r.boat}/>
                    <div style={{flex:1}}>
                      <div style={{height:18,background:"#16273c",borderRadius:4,overflow:"hidden"}}>
                        <div style={{width:Math.max((v/maxV)*100,0)+"%",height:"100%",background:"#3d7ab8"}}/>
                      </div>
                      <div style={{fontSize:10,color:"#7da3c8",marginTop:2}}>
                        {r.course}C ／ {r.baseRate}%{r.windAdj!==0&&<span> 風<span style={{color:col(r.windAdj)}}>{sign(r.windAdj)}%</span></span>}
                      </div>
                    </div>
                    <span style={{width:56,textAlign:"right",fontWeight:800,fontSize:16}}>{fmt(v,1)}%</span>
                  </div>
                );
              })}
            </div>

            {aiEval&&(
              <div style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{fontSize:12,letterSpacing:"0.2em",color:"#7da3c8"}}>総合AI評価</span>
                  <span style={{fontSize:12,fontWeight:800,padding:"3px 10px",borderRadius:999,background:aiEval.badgeColor,color:"#fff"}}>{aiEval.badge}</span>
                </div>
                <div style={{display:"grid",gap:8}}>
                  {aiEval.ranked.map(function(r){
                    var max=Math.max.apply(null,aiEval.ranked.map(function(x){return x.score;}));
                    var min=Math.min.apply(null,aiEval.ranked.map(function(x){return x.score;}));
                    var w=Math.max(4,((r.score-min)/Math.max(max-min,0.01))*100);
                    return (
                      <div key={r.boat} style={{background:"#16273c",borderRadius:10,padding:"10px 12px",border:r.rankPos===1?"1px solid #3d7ab8":"1px solid transparent"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                          <span style={{fontSize:13,color:"#7da3c8",width:18}}>{r.rankPos}.</span>
                          <span style={{fontSize:22,fontWeight:800,width:28,color:r.mark==="◎"?"#f9c513":r.mark==="○"?"#5dd39e":"#e8eef5"}}>{r.mark}</span>
                          <LB b={r.boat}/>
                          <span style={{fontSize:12,color:"#7da3c8"}}>{r.course}C進入</span>
                          <span style={{fontSize:12,color:"#7da3c8",marginLeft:"auto"}}>参考 {fmt(r.final1,1)}%</span>
                        </div>
                        <div style={{height:6,background:"#0e1b2c",borderRadius:3,overflow:"hidden",marginTop:8}}>
                          <div style={{width:w+"%",height:"100%",background:r.rankPos===1?"#f9c513":r.rankPos<=3?"#3d7ab8":"#2c4762"}}/>
                        </div>
                        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:8}}>
                          {[["展示タイム",r.crit.time],["モーター",r.crit.motor],["風",r.crit.wind]].map(function(item){
                            var label=item[0],v=item[1];
                            return <span key={label} style={{fontSize:11,fontWeight:800,padding:"4px 8px",borderRadius:6,background:v===true?"rgba(46,158,107,0.22)":v===false?"#1d3149":"transparent",color:v===true?"#5dd39e":v===false?"#7a8da0":"#4a5d70",border:v===null?"1px dashed #2c4762":"1px solid transparent"}}>{v===true?"✓":v===false?"✗":"−"} {label}</span>;
                          })}
                        </div>
                        {(r.warns.length>0||r.plus.length>0)&&(
                          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>
                            {r.warns.map(function(w){return <span key={w} style={{fontSize:11,fontWeight:800,padding:"4px 8px",borderRadius:6,background:"rgba(249,197,19,0.15)",color:"#f9c513"}}>⚠ {w}</span>;})}
                            {r.plus.map(function(p){return <span key={p} style={{fontSize:11,fontWeight:800,padding:"4px 8px",borderRadius:6,background:"rgba(61,122,184,0.2)",color:"#7db4e8"}}>＋ {p}</span>;})}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
