function windKeyFromCompass(venue, dirRaw, speedRaw){
  if(!dirRaw || !speedRaw) return "無風";
  var d = String(dirRaw).trim();
  if(d==="" || d==="無風" || d==="無\u3000風") return "無風";
  var table = VENUE_WIND_DIR[venue];
  if(!table || !table[d]) return "無風";
  var cat = table[d];
  var sm = String(speedRaw).match(/(\d+)/);
  var speed = sm ? parseInt(sm[1],10) : 0;
  if(speed===0) return "無風";
  if(cat==="向かい風" || cat==="追い風"){
    return speed>=5 ? (cat+"5m以上") : (cat+speed+"m");
  } else {
    return speed>=3 ? (cat+"3m以上") : (cat+speed+"m");
  }
}

function normOddsToProbV2(oddsObj){
  var total=0;
  Object.keys(oddsObj).forEach(function(k){total+=oddsObj[k];});
  if(!total)total=1.0;
  var out={};
  Object.keys(oddsObj).forEach(function(k){out[k]=oddsObj[k]/total;});
  return out;
}
function getSujiV2(honmeiCourse,boatsV2,boatAtCourseMap){

}

function buildBoatsForV2(rd){

    catNames.forEach(function(cat){

        ren2: rd.racerStats&&rd.racerStats.ren2&&rd.racerStats.ren2[cat]?rd.racerStats.ren2[cat][b-1]:null,
        ren3: rd.racerStats&&rd.racerStats.ren3&&rd.racerStats.ren3[cat]?rd.racerStats.ren3[cat][b-1]:null,
      };
    });
    boats[b]={
      boat:b,
      racerClass: rd.racerClass[b-1],
      win1: periods["直近1年"].win1, ren2: periods["直近1年"].ren2, ren3: periods["直近1年"].ren3,
      periods: periods,
      avgST_1y: rd.stScore&&rd.stScore.byPeriod&&rd.stScore.byPeriod["直近1年"]?rd.stScore.byPeriod["直近1年"][b-1]:null,
      kc_nige: rd.kimariCount&&rd.kimariCount.nige?rd.kimariCount.nige[b-1]:null,
      kc_sashi: rd.kimariCount&&rd.kimariCount.sashi?rd.kimariCount.sashi[b-1]:null,
      kc_makuri: rd.kimariCount&&rd.kimariCount.makuri?rd.kimariCount.makuri[b-1]:null,
      kc_makurizashi: rd.kimariCount&&rd.kimariCount.makurizashi?rd.kimariCount.makurizashi[b-1]:null,
      kc_nuki: rd.kimariCount&&rd.kimariCount.nuki?rd.kimariCount.nuki[b-1]:null,
      raceCount_6m: rd.racerRaceCount?rd.racerRaceCount[b-1]:null,
      motor_ren2: rd.motors&&rd.motors[b]?rd.motors[b].ren2:null,
      motor_ren3: rd.motors&&rd.motors[b]?rd.motors[b].ren3:null,
    };
  }
  return boats;
}
function buildExhForV2(rd){
  var exh={};
  for(var b=1;b<=6;b++){
    var inp=rd.inputs[b]||{};
    var tenji=parseFloat(inp.tenji),isshu=parseFloat(inp.isshu),mawari=parseFloat(inp.mawari),chokusen=parseFloat(inp.chokusen);

    };
  }
  return exh;
}

// logic_v2.py の compute_race_v2() 本体の移植版
function computeRaceV2(vname,boats,exh,windKey,courses,waveBucketKey,weatherBucketKey,opts){
  opts=opts||{};
  var racerCat=opts.racerCat||"直近1年";
  var coverageTarget=opts.coverageTarget!=null?opts.coverageTarget:0.55;
  var minN=opts.minN!=null?opts.minN:3;
  var maxN=opts.maxN!=null?opts.maxN:10;

  var allBoats=[1,2,3,4,5,6];
  var vw=VW[vname]||{tenji:1,isshu:1,mawari:1,chokusen:1};
  var baseRates=VENUES[vname];
  if(!baseRates)return null;

  var sums={};
  for(var bi=1;bi<=6;bi++){
    var e=exh[bi];
    if(!e){sums[bi]=null;continue;}
    var s=0.0,valid=true;
    ["tenji","isshu","mawari","chokusen"].forEach(function(k){
      if(!valid)return;
      if((vw[k]||0)===0)return;
      var v=e[k];
      if(v===null||v===undefined){valid=false;return;}
      s+=v*vw[k];
    });
    sums[bi]=valid?s:null;
  }
  var validSums=Object.keys(sums).map(function(k){return sums[k];}).filter(function(v){return v!==null;});
  var avg=validSums.length===6?(validSums.reduce(function(a,b){return a+b;},0)/6):null;

  var wtab=WIND[windKey]||WIND["無風"];
  var wtab0=WIND["無風"];

  var rowsV2={};
  allBoats.forEach(function(bb){
    var course=(courses&&courses[bb]!=null)?courses[bb]:bb;
    var baseRate=baseRates[course-1];
    var windAdj=Math.round((wtab[course-1]-wtab0[course-1])*10)/10;
    var waveAdj=(waveBucketKey&&WAVE[waveBucketKey])?Math.round((WAVE[waveBucketKey][course-1]-WAVE["0cm"][course-1])*10)/10:0.0;
    var weatherAdj=(weatherBucketKey&&WEATHER[weatherBucketKey])?Math.round((WEATHER[weatherBucketKey][course-1]-WEATHER["晴"][course-1])*10)/10:0.0;
    var diff=0.0,adj={w1:0,w2:0,w3:0,top3:0};
    if(avg!==null&&sums[bb]!==null){
      diff=avg-sums[bb];
      adj=lookup(vname,course,diff);
    }
    rowsV2[bb]={boat:bb,course:course,base_rate:baseRate,wind_adj:windAdj,wave_adj:waveAdj,weather_adj:weatherAdj,diff:diff,adj:adj};
  });

  var sumEntries=Object.keys(sums).filter(function(k){return sums[k]!==null;}).map(function(k){return [parseInt(k),sums[k]];});
  sumEntries.sort(function(a,bx){return a[1]-bx[1];});
  var tjRank={};
  sumEntries.forEach(function(pair,i){tjRank[pair[0]]=i+1;});

  var stEntries=[];
  allBoats.forEach(function(bb){if(boats[bb].avgST_1y!==null&&boats[bb].avgST_1y!==undefined)stEntries.push([bb,boats[bb].avgST_1y]);});
  stEntries.sort(function(a,bx){return a[1]-bx[1];});
  var stRank={};
  stEntries.forEach(function(pair,i){stRank[pair[0]]=i+1;});

  var motorVals=allBoats.map(function(bb){return boats[bb].motor_ren2;}).filter(function(v){return v!==null&&v!==undefined;});
  var motorAvg=motorVals.length>=2?(motorVals.reduce(function(a,b){return a+b;},0)/motorVals.length):null;
  var motor3Vals=allBoats.map(function(bb){return boats[bb].motor_ren3;}).filter(function(v){return v!==null&&v!==undefined;});
  var motor3Avg=motor3Vals.length>=2?(motor3Vals.reduce(function(a,b){return a+b;},0)/motor3Vals.length):null;

  function kimariRateV2(bb){
    var bd=boats[bb];
    var rc=bd?bd.raceCount_6m:null;
    var course=rowsV2[bb].course;
    var boatAtCourse=boats[course];
    if(!rc||!boatAtCourse)return null;
    var tot=(boatAtCourse.kc_nige||0)+(boatAtCourse.kc_sashi||0)+(boatAtCourse.kc_makuri||0)+(boatAtCourse.kc_makurizashi||0)+(boatAtCourse.kc_nuki||0);
    return Math.min(1.0,tot/rc);
  }

  var odds1={};

    var r=rowsV2[bb],bd=boats[bb];
    var p0=Math.max(r.base_rate,0.5)/100.0;
    var o=oddsV2(p0);
    var pdata=(bd.periods&&bd.periods[racerCat])||{};
    var personalW1=(pdata.win1!==null&&pdata.win1!==undefined)?pdata.win1:bd.win1;
    if(personalW1!==null&&personalW1!==undefined&&r.base_rate>0){
      o*=clipV2(personalW1/r.base_rate,0.4,2.2);
    }
    if(r.base_rate>0){
      o*=clipV2((r.base_rate+r.adj.w1)/r.base_rate,0.3,2.2);

    if(bd.motor_ren2!==null&&bd.motor_ren2!==undefined&&motorAvg!==null){

    }

    if(kr!==null)o*=(0.7+kr*0.6);

  var honmei=allBoats.reduce(function(a,b){return P1[b]>P1[a]?b:a;});

    var sujiAx=getSujiV2(axisCourse,boats,courseToBoat);

    if(sujiAx&&sujiAx.p2&&sujiAx.p2.length){

    }
    var sujiP2HasAny=Object.keys(sujiP2).length>0;

    function basePrior2(bb){
      if(axisCourse===1&&COURSE1_2ND_PRIOR_V2[rowsV2[bb].course]!==undefined)return COURSE1_2ND_PRIOR_V2[rowsV2[bb].course];
      return (!sujiP2HasAny||sujiP2[bb])?15:6;
    }

    var w2={};
    allBoats.forEach(function(bb){
      if(bb===axis)return;
      var bd=boats[bb];
      var pdata=(bd.periods&&bd.periods[racerCat])||{};
      var personalR2=(pdata.ren2!==null&&pdata.ren2!==undefined)?pdata.ren2:bd.ren2;
      var val=basePrior2(bb);
      var fieldR2=allBoats.filter(function(x){return x!==axis;}).map(function(x){

        return (pdx.ren2||bdx.ren2||0);
      });
      var fieldR2Avg=fieldR2.length?(fieldR2.reduce(function(a,b){return a+b;},0)/fieldR2.length):null;
      if(personalR2!==null&&personalR2!==undefined&&fieldR2Avg){
        val*=fieldR2Avg>0?clipV2(personalR2/fieldR2Avg,0.4,2.2):1.0;

      if(bd.motor_ren2!==null&&bd.motor_ren2!==undefined&&motorAvg!==null){

    var sumW2=Object.keys(w2).reduce(function(a,k){return a+w2[k];},0)||1.0;
    var p2GivenAxis={};
    Object.keys(w2).forEach(function(k){p2GivenAxis[k]=w2[k]/sumW2;});

      });
      var fieldR3Avg=fieldR3.length?(fieldR3.reduce(function(a,b){return a+b;},0)/fieldR3.length):null;
      if(personalR3!==null&&personalR3!==undefined&&fieldR3Avg){
        val*=fieldR3Avg>0?clipV2(personalR3/fieldR3Avg,0.4,2.2):1.0;
      }
      val*=CLASS_MULT_V2[bd.racerClass]!==undefined?CLASS_MULT_V2[bd.racerClass]:1.0;
      if(bd.motor_ren3!==null&&bd.motor_ren3!==undefined&&motor3Avg!==null){

      var p2=p2GivenAxis[second]||0;
      var remaining3={};
      allBoats.forEach(function(c){if(c!==axis&&c!==second)remaining3[c]=w3AllAx[c];});
      var sum3=Object.keys(remaining3).reduce(function(a,k){return a+remaining3[k];},0)||1.0;
      Object.keys(remaining3).forEach(function(thirdK){
        var third=parseInt(thirdK);
        var w3v=remaining3[thirdK];
        var p3=w3v/sum3;
        combosAx.push({second:second,third:third,p2:p2,p3:p3,joint:p2*p3});

    });
    combosAx.sort(function(a,b){return b.joint-a.joint;});
    return [p2GivenAxis,combosAx];
  }

  var res1=combosForAxisV2(honmei);
  var P2GivenHonmei=res1[0],combos=res1[1];
  var res2=combosForAxisV2(taiko);
  var combosTaiko=res2[1];

  var chosen=[];
  var cum=0.0;
  for(var ci=0;ci<combos.length;ci++){
    if(chosen.length>=maxN)break;
    if(chosen.length>=minN&&cum>=coverageTarget)break;
    chosen.push(combos[ci]);
    cum+=combos[ci].joint;
  }
  var bet=chosen.map(function(c){return [c.second,c.third];});

  function axisSplitBetV2(nHonmei,nTaiko){
    var honmeiPart=combos.slice(0,nHonmei).map(function(c){return [honmei,c.second,c.third];});
    var taikoPart=combosTaiko.slice(0,nTaiko).map(function(c){return [taiko,c.second,c.third];});
    return honmeiPart.concat(taikoPart);
  }
  var betHonmei4Taiko2=axisSplitBetV2(4,2);

  return {
    honmei:honmei,taiko:taiko,P1:P1,
    P2_given_honmei:P2GivenHonmei,combos_ranked:combos,combos_ranked_taiko:combosTaiko,
    bet:bet,bet_n:bet.length,coverage:cum,

// v2の計算に必要な最低限のデータ（選手class等）がrdに揃っているかチェック

// ==================== AI1着%基準フォーメーション ====================
// 「AI1着%」は既存のtotalScore系スコアを6艇で正規化したaiP1（予想着率テーブルのAI1着列）を使う。
// v2（logic_v2/オッズ比合成モデル）とは無関係な別指標なので注意（当初v2のP1で実装していたが誤りと判明し、
// aiP1に差し替えた。精度分析ログ追記46参照）。

// 45日6,926Rの検証で、常に最高aiP1の艇のみにするより回収率が高いことを確認済み（精度分析ログ追記46）。
const AI1CHAKU_THRESH={2:20,3:20,4:20,5:15,6:10};

// 6点→8点にすると回収率150.83%→141.41%に下がるが、最大連敗が31→24まで縮小し、
// 追記102の許容ライン(29)を初めて下回ることを確認。ドローダウンの絶対額は増える
// トレードオフあり。7/20フォワードテストではまだ検証中（同日は大穴的中ゼロの特殊日）。
const AI1CHAKU_TOTAL_POINTS_2PLUS=8;
// 日付ベース2分割交差検証(奇数日/偶数日)で、両方とも回収率100%を割った会場。
// 桐生・蒲郡・江戸川等は分割すると大きくブレて再現しなかったため対象外（精度分析ログ追記47〜48参照）。
const AI1CHAKU_WEAK_VENUES=["丸亀","下関"];
// 徳山は以前含まれていたが、当時展示データ(一周・まわり足)がbuild_race_sheet.pyの
// バグで欠損していたことが原因と判明。正しいデータで再計算したところ回収率が
// 74.94%→114.89%に改善したため除外した（精度分析ログ追記50参照）。
function ai1chakuAllocatePoints(cands,rowsByBoat,total){
  if(cands.length===1){var only={};only[cands[0]]=total;return only;}
  var weights={};cands.forEach(function(b){weights[b]=rowsByBoat[b].aiP1||0;});
  var sumW=cands.reduce(function(a,b){return a+weights[b];},0)||1.0;
  var raw={};cands.forEach(function(b){raw[b]=total*weights[b]/sumW;});
  var alloc={};cands.forEach(function(b){alloc[b]=Math.max(1,Math.floor(raw[b]));});
  var diff=total-cands.reduce(function(a,b){return a+alloc[b];},0);
  var remainders=cands.slice().sort(function(a,b){return (raw[b]-Math.floor(raw[b]))-(raw[a]-Math.floor(raw[a]));});
  var i=0;
  while(diff>0){alloc[remainders[i%remainders.length]]++;diff--;i++;}
  while(diff<0){
    var sortedByRaw=cands.slice().sort(function(a,b){return raw[a]-raw[b];});
    var reduced=false;
    for(var k=0;k<sortedByRaw.length;k++){
      if(alloc[sortedByRaw[k]]>1){alloc[sortedByRaw[k]]--;diff++;reduced=true;break;}
    }
    if(!reduced)break;
  }
  return alloc;
}
function ai1chakuR1(r){return r.racerR1final!=null?r.racerR1final:r.final1;}
function ai1chakuR2(r){return r.racerR2final!=null?r.racerR2final:r.baseRate*0.3;}
function ai1chakuR3(r){return r.racerR3final!=null?r.racerR3final:r.baseRate*0.2;}
// predict.py の kimari_score(b) を忠実に移植。決まり手実績(6ヶ月・コース別)を0〜10のスコアに変換する。
// 原典と同様、コース番号を艇番として決まり手データを引く仕様をそのまま踏襲している。
function ai1chakuKimariScore(rd,rowsByBoat,b){
  var course=rowsByBoat[b]?rowsByBoat[b].course:b;
  var rc=rd.racerRaceCount?rd.racerRaceCount[b-1]:null;
  if(!rc)return 5;
  var kc=rd.kimariCount;
  if(!kc)return 5;
  var ci=course-1;
  function gv(arr){return arr&&arr[ci]!=null?arr[ci]:0;}
  var tot=gv(kc.nige)+gv(kc.sashi)+gv(kc.makuri)+gv(kc.makurizashi)+gv(kc.nuki);
  return Math.min(10,tot/rc*10);
}
// 1号艇のAI1着%がこの値を超えたら単独候補とみなす閾値。
// 精度分析ログ追記104で45→30に下げると、回収率・大穴依存の頑健性・最大連敗・
// ドローダウン全てが改善することを確認（78日実測：回収率149.20%・最大連敗16・最大DD44,040円）。
const AI1CHAKU_B1_CUT=30;
function getAi1chakuCandidates(rowsByBoat){
  var aiP1={};for(var b=1;b<=6;b++)aiP1[b]=rowsByBoat[b].aiP1||0;
  if(aiP1[1]>AI1CHAKU_B1_CUT)return [1];
  var cands=[];
  for(var b=2;b<=6;b++){if(aiP1[b]>=AI1CHAKU_THRESH[b])cands.push(b);}
  if(cands.length===0)cands=[1];

}
function makeAi1chakuBetForAxis(rd,rowsByBoat,axis,maxN){
  function aiScore2(b){var rr=rowsByBoat[b];return ai1chakuR2(rr)*0.3+(rr.aiP2||0)*0.3+(rr.ren3total||0)*0.2+ai1chakuKimariScore(rd,rowsByBoat,b)*10*0.2;}
  function aiScore3(b){var rr=rowsByBoat[b];return ai1chakuR3(rr)*0.3+(rr.aiP3||0)*0.3+(rr.ren3total||0)*0.2+ai1chakuKimariScore(rd,rowsByBoat,b)*10*0.2;}
  var allBoats=[1,2,3,4,5,6];
  var aiPlace2=allBoats.filter(function(b){return b!==axis&&ai1chakuR2(rowsByBoat[b])>=10;}).sort(function(a,b){return aiScore2(b)-aiScore2(a);});
  var aiPlace3=allBoats.filter(function(b){return b!==axis&&ai1chakuR3(rowsByBoat[b])>=5;}).sort(function(a,b){return aiScore3(b)-aiScore3(a);});
  var combos=[];
  for(var i=0;i<aiPlace2.length;i++){
    if(combos.length>=maxN)break;
    for(var j=0;j<aiPlace3.length;j++){
      if(combos.length>=maxN)break;
      if(aiPlace2[i]!==aiPlace3[j])combos.push([axis,aiPlace2[i],aiPlace3[j]]);

}
// 2連単版：軸(1着)＋2着候補のみ。各候補にAI2着率(aiP2)を付与して返す。全通り(残り5艇全て)を返す。
function makeAi1chakuBet2ForAxis(rd,rowsByBoat,axis,maxN){
  function aiScore2(b){var rr=rowsByBoat[b];return ai1chakuR2(rr)*0.3+(rr.aiP2||0)*0.3+(rr.ren3total||0)*0.2+ai1chakuKimariScore(rd,rowsByBoat,b)*10*0.2;}
  var allBoats=[1,2,3,4,5,6];
  var aiPlace2=allBoats.filter(function(b){return b!==axis;}).sort(function(a,b){return aiScore2(b)-aiScore2(a);});
  return aiPlace2.slice(0,maxN).map(function(b){return {boat:b,aiP2:rowsByBoat[b].aiP2!=null?rowsByBoat[b].aiP2:null};});

// 【追加】対角線バランス型の2着・3着組み合わせ生成（精度分析ログ参照：現行のp2外側ループ方式は
// 持ち点が少ないとp2候補が実質1艇に固定され「2着のみハズレ」を量産する構造だった。
// p2×p3のペアを「ランク合計（p2順位+p3順位）が小さい順」に選ぶことで、同じ持ち点のまま
// 2着候補の2番手・3番手を早く取り込める。51日・約1,500レースの検証で、展示なし/ありとも
// 現行方式を上回る（回収率+1.4〜+6.8pt、大穴上位10件除外後も+1.7〜+7.8ptで頑健性も改善）ことを確認済み。
function makeAi1chakuBetForAxisBalanced(rd,rowsByBoat,axis,maxN){
  function aiScore2(b){var rr=rowsByBoat[b];return ai1chakuR2(rr)*0.3+(rr.aiP2||0)*0.3+(rr.ren3total||0)*0.2+ai1chakuKimariScore(rd,rowsByBoat,b)*10*0.2;}
  function aiScore3(b){var rr=rowsByBoat[b];return ai1chakuR3(rr)*0.3+(rr.aiP3||0)*0.3+(rr.ren3total||0)*0.2+ai1chakuKimariScore(rd,rowsByBoat,b)*10*0.2;}
  var allBoats=[1,2,3,4,5,6];
  var aiPlace2=allBoats.filter(function(b){return b!==axis&&ai1chakuR2(rowsByBoat[b])>=10;}).sort(function(a,b){return aiScore2(b)-aiScore2(a);});
  var aiPlace3=allBoats.filter(function(b){return b!==axis&&ai1chakuR3(rowsByBoat[b])>=5;}).sort(function(a,b){return aiScore3(b)-aiScore3(a);});
  var pairs=[];
  for(var ri=0;ri<aiPlace2.length;ri++){
    for(var rj=0;rj<aiPlace3.length;rj++){
      if(aiPlace2[ri]===aiPlace3[rj])continue;
      pairs.push([ri+rj,ri,aiPlace2[ri],aiPlace3[rj]]);
    }
  }
  pairs.sort(function(a,b){return (a[0]-b[0])||(a[1]-b[1]);});
  return pairs.slice(0,maxN).map(function(p){return [axis,p[2],p[3]];});
}
function computeAi1chakuFormationBalanced(result,rd,venue,pointOverride){
  if(!result||!result.rows||result.rows.length<6)return null;
  var rowsByBoat={};
  for(var b=1;b<=6;b++){
    var found=result.rows.filter(function(r){return r.boat===b;})[0];
    if(!found)return null;
    rowsByBoat[b]=found;
  }
  if(rowsByBoat[1].aiP1==null)return null;
  var cands=getAi1chakuCandidates(rowsByBoat);
  var origCandsLen=cands.length;
  if(cands.length===3){
    cands=cands.slice().sort(function(a,b){return (rowsByBoat[b].aiP1||0)-(rowsByBoat[a].aiP1||0);}).slice(0,2);
  }
  var effectivePoints=(origCandsLen===2&&pointOverride!=null)?pointOverride:(cands.length>=2?AI1CHAKU_TOTAL_POINTS_2PLUS:AI1CHAKU_TOTAL_POINTS);
  var alloc=ai1chakuAllocatePoints(cands,rowsByBoat,effectivePoints);
  var bet=[];
  cands.forEach(function(axis){
    bet=bet.concat(makeAi1chakuBetForAxisBalanced(rd,rowsByBoat,axis,alloc[axis]));
  });
  var isFallback=(cands.length===1&&cands[0]===1&&(rowsByBoat[1].aiP1||0)<=45);
  return {candidates:cands,bet:bet,isFallback:isFallback,alloc:alloc,origCandsLen:origCandsLen};
}
function computeAi1chakuFormation(result,rd,venue,pointOverride){
  if(!result||!result.rows||result.rows.length<6)return null;
  var rowsByBoat={};
  for(var b=1;b<=6;b++){

    if(!found)return null;
    rowsByBoat[b]=found;
  }
  if(rowsByBoat[1].aiP1==null)return null; // AI1着%が未計算(選手データ不足等)なら非表示
  var cands=getAi1chakuCandidates(rowsByBoat);
  var origCandsLen=cands.length; // 3→2縮小前の元の候補数（persistPointOverrideの適用範囲判定に使う）
  // 【無効化済み】旧ロジック：厳選場（RACE_SELECT_GOOD_VENUES）に限り、候補が3艇以上になった場合に
  // aiP1上位2艇へ絞る処理。188Rという小サンプルでの検証にとどまっていた上、精度分析ログ追記104の
  // b1_cut=30ロジック（バックテストはこの絞り込み無しで実施）と整合しなくなるため無効化。
  // 再度使いたくなった場合は下のif文のコメントを外すだけでよい。
  // if(venue&&RACE_SELECT_GOOD_VENUES.indexOf(venue)>=0&&cands.length>2){
  //   cands=cands.slice().sort(function(a,b){return (rowsByBoat[b].aiP1||0)-(rowsByBoat[a].aiP1||0);}).slice(0,2);
  // }
  // 採用（精度分析ログ追記104・109日再検証）：候補3艇になった場合、aiP1が最も低い3番目を除外し、
  // 残り2艇に持ち点8点を集中。109日実測で、3艇のまま8点均等より大穴依存を除いた頑健性が上回り
  // （上位10件除外後135.23% vs 134.31%）、ドローダウン（29,310円 vs 44,040円）・最大連敗

  if(cands.length===3){

  }

  var effectivePoints=(origCandsLen===2&&pointOverride!=null)?pointOverride:(cands.length>=2?AI1CHAKU_TOTAL_POINTS_2PLUS:AI1CHAKU_TOTAL_POINTS);
  var alloc=ai1chakuAllocatePoints(cands,rowsByBoat,effectivePoints);
  var bet=[];
  cands.forEach(function(axis){
    bet=bet.concat(makeAi1chakuBetForAxis(rd,rowsByBoat,axis,alloc[axis]));
  });
  var isFallback=(cands.length===1&&cands[0]===1&&(rowsByBoat[1].aiP1||0)<=45);
  return {candidates:cands,bet:bet,isFallback:isFallback,alloc:alloc,origCandsLen:origCandsLen};

  // 候補が「もともとちょうど2艇」のレースのみを選定対象とする。3艇→2艇に縮小したケースは
  // 判定が際どい(3番目の候補も閾値を超えていた)ことが多く、含めると的中率・回収率がやや悪化する
  // ことを6,063レースの実測で確認済み（候補2艇以上全体27.1%/151.07% → ちょうど2艇のみ28.3%/156.90%）。
  // 旧基準（候補2艇以上、3艇縮小も含む）は下にコメントとして残す。
  return ai1chaku.origCandsLen===2;
  // return ai1chaku.candidates.length>=2; // 旧基準
}
// 合成オッズ＝1/Σ(1/オッズ)。買い目全点のオッズが揃っている時のみ算出（1点でも未取得ならnull）。
function synthesizeOdds(combos,oddsObj){
  if(!oddsObj||!combos||combos.length===0)return null;
  var sumInv=0;
  for(var i=0;i<combos.length;i++){
    var c=combos[i];
    var key=c[0]+"-"+c[1]+"-"+c[2];
    var o=oddsObj[key];
    if(o==null||isNaN(o))return null;
    sumInv+=1/o;
  }
  if(sumInv<=0)return null;
  return 1/sumInv;
}
// 買い目リストをフォーメーション表記（例：1-23-2345）に圧縮する。
// 軸（1着）ごとにグループ化し、その軸の(2着,3着)組の中から「2着候補×3着候補（2着≠3着）」の
// 矩形になっている部分を貪欲に探して圧縮表記にする。矩形に入らない点は単独の組番として残す。
function allNonEmptySubsets(arr){
  var subsets=[];
  var n=arr.length;
  for(var mask=1;mask<(1<<n);mask++){
    var subset=[];
    for(var i=0;i<n;i++){
      if(mask&(1<<i))subset.push(arr[i]);
    }
    subsets.push(subset);
  }
  return subsets;
}
function compressFormation(combos){
  if(!combos||combos.length===0)return [];
  var byAxis={};
  combos.forEach(function(t){
    var ax=t[0];
    if(!byAxis[ax])byAxis[ax]=[];
    byAxis[ax].push([t[1],t[2]]);
  });
  var out=[];
  Object.keys(byAxis).sort(function(a,b){return a-b;}).forEach(function(axStr){
    var ax=parseInt(axStr,10);
    var remainingSet=new Set(byAxis[axStr].map(function(p){return p[0]+"-"+p[1];}));
    var groups=[];
    while(remainingSet.size>0){
      var pairsArr=Array.from(remainingSet).map(function(k){var parts=k.split("-");return [parseInt(parts[0],10),parseInt(parts[1],10)];});
      var seconds=Array.from(new Set(pairsArr.map(function(p){return p[0];})));
      var thirds=Array.from(new Set(pairsArr.map(function(p){return p[1];})));
      var bestRect=null;
      allNonEmptySubsets(seconds).forEach(function(ss){
        allNonEmptySubsets(thirds).forEach(function(ts){
          var expected=[];
          ss.forEach(function(s){ ts.forEach(function(t){ if(s!==t)expected.push(s+"-"+t); }); });
          if(expected.length<2)return; // 1点だけなら圧縮の意味が無い
          var allPresent=expected.every(function(k){return remainingSet.has(k);});
          if(allPresent&&(!bestRect||expected.length>bestRect.expected.length)){
            bestRect={ss:ss.slice().sort(function(a,b){return a-b;}),ts:ts.slice().sort(function(a,b){return a-b;}),expected:expected};
          }
        });
      });
      if(bestRect){
        groups.push({type:"formation",text:ax+"-"+bestRect.ss.join("")+"-"+bestRect.ts.join(""),n:bestRect.expected.length});
        bestRect.expected.forEach(function(k){remainingSet.delete(k);});
      }else{
        var firstKey=remainingSet.values().next().value;
        var parts=firstKey.split("-");
        groups.push({type:"single",text:ax+"-"+parts[0]+"-"+parts[1],n:1});
        remainingSet.delete(firstKey);
      }
    }
    groups.forEach(function(g){out.push(g);});
  });
  return out;
}

function computeResultForRd(venue,rd,racerCat){
    if(!venue)return null;
    var vw=VW[venue]||{tenji:1,isshu:1,mawari:1,chokusen:1};
    var sums={};
    var hasAnyTime=false;
    for(var b=1;b<=6;b++){
      var inp=rd.inputs[b];
      var vals={tenji:parseFloat(inp.tenji),isshu:parseFloat(inp.isshu),mawari:parseFloat(inp.mawari),chokusen:parseFloat(inp.chokusen)};
      var sum=0,valid=true;
      var ks=["tenji","isshu","mawari","chokusen"];
      for(var ki=0;ki<ks.length;ki++){
        var kk=ks[ki];
        if(vw[kk]===0)continue;
        if(isNaN(vals[kk])){valid=false;break;}
        sum+=vals[kk]*vw[kk];
      }
      sums[b]=valid?sum:null;
      if(valid)hasAnyTime=true;
    }
    var avg=null;
    if(hasAnyTime){
      var validSums=[];
      for(var b=1;b<=6;b++){if(sums[b]!=null)validSums.push(sums[b]);}
      if(validSums.length===6){
        var total=0;for(var i=0;i<validSums.length;i++)total+=validSums[i];
        avg=total/6;
      }
    }
    var base=VENUES[venue],rows=[];
    for(var b=1;b<=6;b++){
      var course=rd.courses[b];
      var baseRate=base[course-1];
      var windAdj=+(WIND[rd.wind][course-1]-WIND["無風"][course-1]).toFixed(1);
      var wb=waveBucket(rd.waveHeight),wtb=weatherBucket(rd.weather);
      var waveAdj=wb&&WAVE[wb]?+(WAVE[wb][course-1]-WAVE["0cm"][course-1]).toFixed(1):0;
      var weatherAdj=wtb&&WEATHER[wtb]?+(WEATHER[wtb][course-1]-WEATHER["晴"][course-1]).toFixed(1):0;
      var diff=0,adj={w1:0,w2:0,w3:0,top3:0};
      if(avg!=null&&sums[b]!=null){
        diff=avg-sums[b];
        adj=lookup(venue,course,diff);
      }
      var rs=rd.racerStats;
      var rW1=rs&&rs.win1&&rs.win1[racerCat]?rs.win1[racerCat][b-1]:null;
      var rR2=rs&&rs.ren2&&rs.ren2[racerCat]?rs.ren2[racerCat][b-1]:null;
      var rR3=rs&&rs.ren3&&rs.ren3[racerCat]?rs.ren3[racerCat][b-1]:null;
      rows.push({
        boat:b,course:course,
        sum:sums[b],diff:diff,
        baseRate:baseRate,windAdj:windAdj,waveAdj:waveAdj,weatherAdj:weatherAdj,
        final1:baseRate+adj.w1+windAdj+waveAdj+weatherAdj,
        racerR1final:rW1!=null?rW1+adj.w1:null,
        racerR2final:rR2!=null?rR2+adj.w1+adj.w2:null,
        racerR3final:rR3!=null?rR3+adj.top3:null,
        w1:adj.w1,w2:adj.w2,w3:adj.w3,top3:adj.top3,
        hasTime:sums[b]!=null,
      });
    }
    var hasRacer=false;

    // 総合3連対率計算（枠別3連対率＋モーター補正＋階級補正）
    var motorRen3Vals=[];
    for(var b=1;b<=6;b++){if(rd.motors[b]&&rd.motors[b].ren3!=null)motorRen3Vals.push(rd.motors[b].ren3);}
    var motorRen3Avg=motorRen3Vals.length>=2?motorRen3Vals.reduce(function(a,c){return a+c;},0)/motorRen3Vals.length:null;
    for(var i=0;i<rows.length;i++){
      var rr=rows[i];
      var rs2=rd.racerStats;
      var base3=rs2&&rs2.ren3raw&&rs2.ren3raw[racerCat]?rs2.ren3raw[racerCat][rr.boat-1]:null;
      if(base3!=null){
        var m3=rd.motors[rr.boat];
        var motorAdj3=m3&&m3.ren3!=null&&motorRen3Avg!=null?(m3.ren3-motorRen3Avg)*0.1:0;
        var cl3=rd.racerClass?rd.racerClass[rr.boat-1]:null;
        var classAdj3=cl3==="A1"?2:cl3==="A2"?1:cl3==="B1"?0:-1;
        rows[i].ren3total=Math.max(0,+(base3+motorAdj3+classAdj3).toFixed(1));
      } else {
        rows[i].ren3total=null;
      }
    }
    for(var i=0;i<rows.length;i++){if(rows[i].racerR1final!=null||rows[i].racerR3final!=null)hasRacer=true;}

    // 展示タイム順位をrowsに格納（小さいほど速い）
    var sumEntries=[];
    for(var b=1;b<=6;b++){if(sums[b]!=null)sumEntries.push({b:b,s:sums[b]});}
    sumEntries.sort(function(a,bb){return a.s-bb.s;});
    var tjRankMap={};
    for(var ti=0;ti<sumEntries.length;ti++)tjRankMap[sumEntries[ti].b]=ti+1;
    for(var i=0;i<rows.length;i++){rows[i].tjRank=tjRankMap[rows[i].boat]||null;}

    // AIスコアから予測確率を算出（各スコアを正規化）
    // totalScore関数はyoso内で定義されているため、ここで同等の計算を行う
    (function(){
      // 各スコア計算（result.rowsを使用）
      var motorVals2=[];
      for(var b=1;b<=6;b++){if(rd.motors[b]&&rd.motors[b].ren2!=null)motorVals2.push({b:b,v:rd.motors[b].ren2});}
      var mAvg2=motorVals2.length>=2?motorVals2.reduce(function(a,c){return a+c.v;},0)/motorVals2.length:null;
      function cScore(b){var cl=rd.racerClass?rd.racerClass[b-1]:null;return cl==="A1"?4:cl==="A2"?3:cl==="B1"?2:1;}
      function rScore(b){var rank=rd.stScore&&rd.stScore.rank?rd.stScore.rank[b-1]:null;return rank!=null?Math.max(0,7-rank):0;}
      function mScore(b){var m=rd.motors[b];if(!m||m.ren2==null||mAvg2==null)return 0;return Math.min(5,Math.max(0,(m.ren2-mAvg2)/10));}
      var courseToBoat1={};for(var _ib1=0;_ib1<rows.length;_ib1++){courseToBoat1[rows[_ib1].course]=rows[_ib1].boat;}
      function kScore(r){if(!rd.kimariCount||!rd.racerRaceCount)return 5;var rcVal=rd.racerRaceCount[r.boat-1];if(!rcVal)return 5;var actualBoat=courseToBoat1[r.course];if(actualBoat==null)return 5;var ci=actualBoat-1,tot=0;var arrs=[rd.kimariCount.nige,rd.kimariCount.sashi,rd.kimariCount.makuri,rd.kimariCount.makurizashi,rd.kimariCount.nuki];for(var ai=0;ai<arrs.length;ai++){if(arrs[ai]&&arrs[ai][ci]!=null)tot+=arrs[ai][ci];}return Math.min(10,tot/rcVal*10);}
      // 節間得点率による補正（精度分析ログ追記53：45日6,926Rバックテストでw=0.3が最良かつ
      // 日付ベース2分割交差検証でも安定して回収率改善を確認済み。フィールド平均との相対差を
      // ±4にクリップして加点/減点。節出走回数(nodes)が0（節初日で未計算）の艇は対象外＝補正0）。
      var tokutenRates=[];
      for(var tb=1;tb<=6;tb++){
        var tk0=rd.tokuten&&rd.tokuten[tb];
        if(tk0&&tk0.rate!=null&&(tk0.nodes||0)>=1)tokutenRates.push(tk0.rate);
      }
      var tokutenFieldAvg=tokutenRates.length?tokutenRates.reduce(function(a,c){return a+c;},0)/tokutenRates.length:null;
      function tokutenBonus(b){
        var tk=rd.tokuten&&rd.tokuten[b];
        if(!tk||tk.rate==null||(tk.nodes||0)<1||tokutenFieldAvg==null)return 0;
        var diff=Math.max(-4,Math.min(4,tk.rate-tokutenFieldAvg));
        return diff*0.3;
      }
      var b1r=rows.filter(function(r){return r.boat===1;})[0];
      var b1diff=b1r&&b1r.diff!=null&&b1r.diff<=0;
      var s1=[],s2=[],s3=[];
      for(var i=0;i<rows.length;i++){
        var r=rows[i];
        var r1v=r.racerR1final!=null?r.racerR1final:r.final1;
        var r2v=r.racerR2final!=null?r.racerR2final:r.baseRate*0.3;
        var r3v=r.racerR3final!=null?r.racerR3final:r.baseRate*0.2;
        var ts1=r1v*0.6+cScore(r.boat)*1+rScore(r.boat)*0.5+kScore(r)*0.3+mScore(r.boat)*0.4+(r.windAdj+r.waveAdj+r.weatherAdj)*0.3+tokutenBonus(r.boat);
        if(r.boat===1&&b1diff)ts1-=10;
        var ts2=r2v*0.5+cScore(r.boat)*1.5+rScore(r.boat)*0.5+kScore(r)*0.3+mScore(r.boat)*0.5;
        var ts3=r3v*0.7+cScore(r.boat)*1+kScore(r)*0.2+mScore(r.boat)*0.3;
        s1.push({boat:r.boat,s:Math.max(0,ts1)});
        s2.push({boat:r.boat,s:Math.max(0,ts2)});
        s3.push({boat:r.boat,s:Math.max(0,ts3)});
      }
      var sum1=s1.reduce(function(a,c){return a+c.s;},0)||1;
      var sum2=s2.reduce(function(a,c){return a+c.s;},0)||1;
      var sum3=s3.reduce(function(a,c){return a+c.s;},0)||1;
      for(var i=0;i<rows.length;i++){
        rows[i].aiP1=+(s1[i].s/sum1*100).toFixed(1);
        rows[i].aiP2=+(s2[i].s/sum2*100).toFixed(1);
        rows[i].aiP3=+(s3[i].s/sum3*100).toFixed(1);
      }
    })();
    var sorted=null;
    if(hasRacer){
      sorted=rows.slice().sort(function(a,b){
        var sa=a.racerR1final!=null?a.racerR1final:(a.racerR3final!=null?a.racerR3final-100:-999);
        var sb=b.racerR1final!=null?b.racerR1final:(b.racerR3final!=null?b.racerR3final-100:-999);
        return sb-sa;
      });
    }
    var cs=Object.values(rd.courses);var uniq={};for(var i=0;i<cs.length;i++)uniq[cs[i]]=1;
    var dup=Object.keys(uniq).length!==6;
    return{avg:avg,rows:rows,racerRank:sorted,dup:dup,hasTime:hasAnyTime};
}

function parseCSVFull(text){
  if(text&&text.charCodeAt(0)===0xFEFF)text=text.slice(1); // 先頭のBOMを除去（Excel/BOATCAST等が付与することがあり、付いたままだとヘッダー1列目の判定が常に失敗する）
  var rows=[],cur="",inQ=false,row=[];
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur);cur="";}
    else if((c==='\n'||c==='\r')&&!inQ){
      if(c==='\r'&&text[i+1]==='\n')i++;
      row.push(cur);cur="";
      for(var k=0;k<row.length;k++){if(row[k].trim()){rows.push(row.slice());break;}}
      row=[];
    } else cur+=c;
  }
  if(cur||row.length){row.push(cur);for(var k=0;k<row.length;k++){if(row[k].trim()){rows.push(row.slice());break;}}}
  return rows;
}

      var cat=catNames[ci];
      base.racerStats.win1[cat]=periodData[cat].win1;
      base.racerStats.ren2[cat]=periodData[cat].ren2;
      base.racerStats.ren3[cat]=periodData[cat].ren3;
      base.racerStats.ren3raw[cat]=periodData[cat].ren3raw;
    }
    // 全期間の平均STを格納
    var ST_COLS={"直近1ヶ月":27,"直近3ヶ月":51,"直近6ヶ月":75,"直近1年":99,"全期間":123};
    var stByPeriod={};
    var stPeriodKeys=Object.keys(ST_COLS);
    for(var spi=0;spi<stPeriodKeys.length;spi++){
      var spk=stPeriodKeys[spi];
      var stArr=[null,null,null,null,null,null];
      for(var bi3=0;bi3<boats.length;bi3++){
        var brow=boats[bi3];
        var bb=pi(brow[0]);
        if(!bb||bb<1||bb>6)continue;
        stArr[bb-1]=pf(brow[ST_COLS[spk]]);
      }
      stByPeriod[spk]=stArr;
    }
    // 当地版の平均ST（3ヶ月=col52, 1年=col100）を取得し、フォールバックチェーン
    // 「当地3ヶ月→当地1年→全国1年」でデフォルト値を組み立てる（精度分析ログ追記81・82で検証・採用）。
    var stLocal3m=[null,null,null,null,null,null];
    var stLocal1y=[null,null,null,null,null,null];
    for(var bi3b=0;bi3b<boats.length;bi3b++){
      var browL=boats[bi3b];
      var bbL=pi(browL[0]);
      if(!bbL||bbL<1||bbL>6)continue;
      stLocal3m[bbL-1]=pf(browL[52]);
      stLocal1y[bbL-1]=pf(browL[100]);
    }
    var stDefault=[null,null,null,null,null,null];
    for(var sdi=0;sdi<6;sdi++){
      stDefault[sdi]=stLocal3m[sdi]!=null?stLocal3m[sdi]:(stLocal1y[sdi]!=null?stLocal1y[sdi]:(stByPeriod["直近1年"]?stByPeriod["直近1年"][sdi]:(st_1y?st_1y[sdi]:null)));
    }
    function calcStRank(arr){
      var rank=[null,null,null,null,null,null];
      var ents=[];
      for(var bi2=0;bi2<6;bi2++){if(arr[bi2]!=null)ents.push({idx:bi2,v:arr[bi2]});}
      ents.sort(function(a,bv){return a.v-bv.v;});
      for(var si=0;si<ents.length;si++){rank[ents[si].idx]=si+1;}
      return rank;
    }
    // 平均スタート順位（全国直近1年 col101）
    var avgStRank=[null,null,null,null,null,null];
    for(var bi4=0;bi4<boats.length;bi4++){
      var brow4=boats[bi4];
      var bb4=pi(brow4[0]);
      if(!bb4||bb4<1||bb4>6)continue;
      avgStRank[bb4-1]=pf(brow4[101]);
    }
    base.stScore={
      rate:stDefault,rank:calcStRank(stDefault),st1y:stDefault,
      byPeriod:stByPeriod,calcRank:null,avgStRank:avgStRank,
    };
    if(!updated[rd.vname])updated[rd.vname]={};
    updated[rd.vname][rd.rnum]=base;
  }
  return updated;
}

// 結果CSV（1行=1艇：進入コース・展示タイム・ST・天候・風向・風速・波高を含む）から
// 展示情報を一括取り込みする。既存のレースデータ(races)にマージする形で更新分だけ返す。
// 直前情報CSV（1行=1艇、全場・全レース分まとめて1ファイル）を取り込む。
// 列: 場名,レース番号,締切時間,艇番,登番,選手名,展示タイム,体重,調整重量,チルト,一周,まわり足,直線,気温,水温
function parseTenjiCSV(allRows, existingRaces){
  function pf(v){var n=parseFloat((v||"").replace(/%/g,"").trim());return isNaN(n)?null:n;}
  function pi(v){var n=parseInt(v);return isNaN(n)?null:n;}
  var raceMap={};
  for(var ri=1;ri<allRows.length;ri++){
    var row=allRows[ri];
    if(row.length<13)continue;
    var vname=(row[0]||"").trim();
    var rnum=pi(row[1]);
    if(!vname||!rnum||rnum<1||rnum>12)continue;
    if(!VENUES[vname])continue;
    var key=rk(vname,rnum);
    if(!raceMap[key]){raceMap[key]={vname:vname,rnum:rnum,shimekiri:(row[2]||"").trim()||null,boats:[]};}
    raceMap[key].boats.push(row);
  }
  var updated={};
  var keys=Object.keys(raceMap);
  for(var ki=0;ki<keys.length;ki++){
    var key=keys[ki];
    var rm=raceMap[key];
    if(rm.boats.length<1)continue;
    var base=existingRaces&&existingRaces[key]?Object.assign({},existingRaces[key]):emptyRace();
    var ni=Object.assign({},base.inputs),nt=Object.assign({},base.tilts),nw=Object.assign({},base.weights);
    var tiltSet=TILT_OPT.map(Number);
    var gotAny=false;
    for(var bi=0;bi<rm.boats.length;bi++){
      var brow=rm.boats[bi];
      var b=pi(brow[3]);
      if(!b||b<1||b>6)continue;
      var tenji=pf(brow[6]),weight=pf(brow[7]),tilt=pf(brow[9]),isshu=pf(brow[10]),mawari=pf(brow[11]),chokusen=pf(brow[12]);
      var prevInp=ni[b]||emptyInput();
      var newInp={
        tenji:(tenji!=null&&tenji>=5.5&&tenji<=7.8)?String(tenji):prevInp.tenji,
        isshu:(isshu!=null&&isshu>=15&&isshu<=45)?String(isshu):prevInp.isshu,
        mawari:(mawari!=null&&mawari>=4.5&&mawari<=15)?String(mawari):prevInp.mawari,
        chokusen:(chokusen!=null&&chokusen>=5.5&&chokusen<=10.0)?String(chokusen):prevInp.chokusen,
      };
      ni[b]=newInp;
      if(weight!=null&&weight>=40&&weight<=70)nw[b]=String(weight);
      if(tilt!=null){var s=(Math.round(tilt*2)/2).toFixed(1);if(tiltSet.indexOf(Number(s))>=0)nt[b]=s;}
      gotAny=true;
    }
    if(!gotAny)continue;
    var nextRace=Object.assign({},base,{inputs:ni,tilts:nt,weights:nw});
    if(rm.shimekiri&&/^\d{1,2}:\d{2}$/.test(rm.shimekiri))nextRace.shimekiri=rm.shimekiri;
    nextRace.tenjiMsg="✓ CSVから読み込みました";
    if(!updated[rm.vname])updated[rm.vname]={};
    updated[rm.vname][rm.rnum]=nextRace;
  }
  return updated;
}

function parseResultsCSV(allRows, existingRaces){

    var ni=Object.assign({},base.inputs),nc=Object.assign({},base.courses);

      if(windDirRaw==null)windDirRaw=(brow[16]||"").trim();
      if(windSpeedRaw==null)windSpeedRaw=(brow[17]||"").trim();

    out.weather=weatherRaw||base.weather;
    out.waveHeight=waveRaw||base.waveHeight;
    updated[rm.vname][rm.rnum]=out;
  }
  return updated;
}

function parseRowByIndex(d){
  function pf(s){var n=parseFloat((s||"").replace(/%/g,"").trim());return isNaN(n)?null:n;}
  function ps(s){var v=(s||"").trim();return(v==="-"||v==="")?null:v;}
  function pct(s){var v=(s||"").split("\n")[0].replace(/%/,"").trim();if(v==="-"||v==="")return null;var n=parseFloat(v);return isNaN(n)?null:n;}
  function pi(s){var n=parseInt(s);return isNaN(n)?null:n;}
  function g(arr,i){return arr[i]||"";}

  var racerClass=[];
  for(var i=2;i<=7;i++){var v=ps(g(d,i));if(v)racerClass.push(v);}

  var stTable={
    "今期":    [10,11,12,13,14,15].map(function(i){return pf(g(d,i));}),
    "直近3ヶ月":[17,18,19,20,21,22].map(function(i){return pf(g(d,i));}),
    "直近1ヶ月":[24,25,26,27,28,29].map(function(i){return pf(g(d,i));}),
    "初日":    [31,32,33,34,35,36].map(function(i){return pf(g(d,i));}),
    "最終日":  [38,39,40,41,42,43].map(function(i){return pf(g(d,i));}),
    "ナイター":[45,46,47,48,49,50].map(function(i){return pf(g(d,i));}),
    "F持":     [52,53,54,55,56,57].map(function(i){return pf(g(d,i));}),
  };
  var sts={1:"",2:"",3:"",4:"",5:"",6:""};
  var fSts={1:"",2:"",3:"",4:"",5:"",6:""};
  var sk=stTable["今期"];
  if(sk)for(var b=1;b<=6;b++){var v=sk[b-1];if(v!=null&&v>=0&&v<=0.6)sts[b]=Math.min(0.4,v).toFixed(2);}
  var sf=stTable["F持"];
  if(sf)for(var b=1;b<=6;b++){var v=sf[b-1];if(v!=null&&v>=0&&v<=0.6)fSts[b]=Math.min(0.4,v).toFixed(2);}

  var stScore={
    rate:[68,69,70,71,72,73].map(function(i){return pf(g(d,i));}),
    rank:[75,76,77,78,79,80].map(function(i){return pi(g(d,i));}),
    st1y:[443,444,445,446,447,448].map(function(i){return pf(g(d,i));}),
  };

  // ★ 修正: CAT_BASEを+1ずつ補正（例: 今期 83→84, 直近6ヶ月 90→91, ...）
  var CATS=["今期","直近6ヶ月","直近3ヶ月","直近1ヶ月","当地","一般戦","SG/G1","直近1年"];
  var CAT_BASE=[[84],[91],[98],[105],[112],[119],[126],[133]];
  var win1raw={},ren2raw={},ren3raw={};
  for(var ci=0;ci<CATS.length;ci++){
    var cat=CATS[ci],off=CAT_BASE[ci][0];
    win1raw[cat]=[0,1,2,3,4,5].map(function(j){return pct(g(d,off+j));});
    ren2raw[cat]=[0,1,2,3,4,5].map(function(j){return pct(g(d,off+57+j));});
    ren3raw[cat]=[0,1,2,3,4,5].map(function(j){return pct(g(d,off+114+j));});
  }
  function adjS(sec,base){
    var o={};
    for(var k in sec){
      var r=sec[k],bb=base[k];
      if(!r){o[k]=null;continue;}
      o[k]=r.map(function(v,i){var w=bb?bb[i]:null;return(v!=null&&w!=null)?Math.max(0,+(v-w).toFixed(1)):v;});
    }
    return o;
  }
  function cleanS(sec){
    var o={};
    for(var k in sec){
      var a=sec[k];
      o[k]=a?a.map(function(v){return(v!=null&&v>=0&&v<=100)?v:null;}):null;
    }
    return o;
  }
  var ren2adj=adjS(ren2raw,win1raw);
  var ren3adj=adjS(ren3raw,ren2raw); // 3着率 = 3連対率 - 2連対率
  var racerStats={win1:cleanS(win1raw),ren2:cleanS(ren2adj),ren3:cleanS(ren3adj),ren3raw:cleanS(ren3raw)};

  var racerRaceCount=[91,92,93,94,95,96].map(function(i){
    var m=(g(d,i)).match(/\((\d+)\)/);return m?parseInt(m[1]):null;
  });

  function pKim(base){
    // base=ラベル行, base+2=逃げ率, base+4=逃し率, base+6=差され率
    // base+8〜12=差し率(2〜6C), base+14=捲られ率
    // base+16〜20=捲り率(2〜6C), base+22=捲られ差率, base+24〜28=捲り差し率(2〜6C)
    return {
      nige:pf(g(d,base+2)),nigashi:pf(g(d,base+4)),sasare:pf(g(d,base+6)),
      sashi:[0,1,2,3,4].map(function(j){return pf(g(d,base+8+j));}),
      makurare:pf(g(d,base+14)),
      makuri:[0,1,2,3,4].map(function(j){return pf(g(d,base+16+j));}),
      makuraresashi:pf(g(d,base+22)),
      makurizashi:[0,1,2,3,4].map(function(j){return pf(g(d,base+24+j));}),
    };
  }
  var kimari={"直近6ヶ月":pKim(254),"直近1年":pKim(283)};

  var nigeSim={
    win1:pf(g(d,313)),nigeRate:pf(g(d,315)),
    second:[317,318,319,320,321].map(function(i){return pf(g(d,i));}),
    third:[323,324,325,326,327].map(function(i){return pf(g(d,i));}),
    deme:[336,338,340,342,344].map(function(i){return pf(g(d,i));}),
  };

  function pkc(base){
    return [0,1,2,3,4,5].map(function(j){
      var v=(g(d,base+j)).trim();
      return(v==="-"||v==="")?null:(parseInt(v)||null);
    });
  }
  var kimariCount={nige:pkc(349),sashi:pkc(356),makuri:pkc(363),makurizashi:pkc(370)};

  var motors={};
  for(var b=1;b<=6;b++){
    var motorRankStr=g(d,378+b);
    var motorRankNum=motorRankStr?parseInt(motorRankStr):null;
    motors[b]={
      rate:pf(g(d,392+b)),
      ren2:pf(g(d,406+b)),
      ren3:pf(g(d,413+b)),
      rank:isNaN(motorRankNum)?null:motorRankNum,
    };
  }

  var base=emptyRace();
  base.racerClass=racerClass.length===6?racerClass:null;
  base.stTable=stTable;base.stScore=stScore;base.sts=sts;base.fSts=fSts;
  base.racerStats=racerStats;base.racerRaceCount=racerRaceCount;
  base.kimari=kimari;base.kimariCount=kimariCount;base.nigeSim=nigeSim;
  var shimekiriMatch=(g(d,0)||"").match(/締切(\d{1,2}:\d{2})/);
  var shimekiri=shimekiriMatch?shimekiriMatch[1]:null;
  // 選手番号（d[450]〜d[455]：1〜6号艇）
  var playerNums=[null,null,null,null,null,null];
  for(var b=1;b<=6;b++){var pn=g(d,449+b);if(pn&&pn.trim())playerNums[b-1]=pn.trim();}
  // 登録地（d[456]〜d[461]：1〜6号艇、"91期\n岡山"形式）
  var playerAreas=[null,null,null,null,null,null];
  for(var b=1;b<=6;b++){var pa=g(d,455+b);if(pa&&pa.trim()){var parts=pa.trim().split("\n");playerAreas[b-1]=parts[parts.length-1]||null;}}
  base.motors=motors;base.shimekiri=shimekiri;base.playerNums=playerNums;base.playerAreas=playerAreas;base.pMsg="✓ CSVから読み込みました";
  return base;
}

class ErrorBoundary extends React.Component{
  constructor(props){
    super(props);
    this.state={hasError:false,errorMsg:"",errorStack:""};
  }
  static getDerivedStateFromError(error){
    return{hasError:true,errorMsg:String(error&&error.message||error)};
  }
  componentDidCatch(error,info){
    this.setState({errorStack:(info&&info.componentStack)||""});
  }
  render(){
    if(this.state.hasError){
      return(
        <div style={{minHeight:"100vh",background:"#0e1b2c",color:"#fff",padding:20,fontFamily:"sans-serif"}}>
          <div style={{fontSize:18,fontWeight:800,color:"#ff8a80",marginBottom:12}}>⚠️ エラーが発生しました</div>
          <div style={{fontSize:13,color:"#e6edf3",marginBottom:12,wordBreak:"break-all"}}>{this.state.errorMsg}</div>
          <div style={{fontSize:11,color:"#9db5cc",marginBottom:16,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{this.state.errorStack}</div>
          <button onClick={function(){window.location.reload();}} style={{padding:"10px 16px",borderRadius:8,background:"#3d7ab8",color:"#fff",border:"none",fontSize:14,fontWeight:700}}>再読み込み</button>
        </div>
      );
    }
    return this.props.children;
  }
}

  function handleCSV(e){
    var file=e.target.files[0];if(!file)return;

    reader.onload=function(ev){
      try{
        var allRows=parseCSVFull(ev.target.result);
        if(allRows.length<2){setCsvMsg("データ行が見つかりません");return;}
        var headers=allRows[0];
        var isNewFormat=headers[15]==="場名"&&headers[16]==="レース番号";
        var imported=0,updated={},skipLog={};
        if(isNewFormat){
          // 新フォーマット: 1行=1艇
          updated=parseNewCSV(allRows);
          var vkeys=Object.keys(updated);
          for(var vi=0;vi<vkeys.length;vi++){
            imported+=Object.keys(updated[vkeys[vi]]).length;
          }
        } else {
          // 旧フォーマット: 1行=1レース（ボートレース日和）
          var idxV=headers.indexOf("場所3");
          for(var ri=1;ri<allRows.length;ri++){
            var row=allRows[ri];
            if(row.length<10){skipLog["列数不足"]=(skipLog["列数不足"]||0)+1;continue;}
            var vname=(row[idxV]||"").trim();
            if(!vname||!VENUES[vname]){skipLog["場名:"+vname]=(skipLog["場名:"+vname]||0)+1;continue;}
            var rtxt=(row[5]||"").trim();
            var rm=rtxt.match(/^(\d+)R/);
            var rnum=rm?parseInt(rm[1]):null;
            if(!rnum||rnum<1||rnum>12){skipLog["raceNo不明"]=(skipLog["raceNo不明"]||0)+1;continue;}
            try{
              var parsed=parseRowByIndex(row.slice(5));
              var col3=(row[3]||"").trim();
              if(/^\d{1,2}:\d{2}$/.test(col3))parsed.shimekiri=col3;
              if(!updated[vname])updated[vname]={};
              updated[vname][rnum]=parsed;
              imported++;
            }catch(err){
              var ek="エラー:"+err.message.slice(0,30);
              skipLog[ek]=(skipLog[ek]||0)+1;
            }
          }
        }
        if(imported===0){setCsvMsg("取り込めませんでした");setCsvDebug({log:JSON.stringify(skipLog)});return;}
        setRaces(function(prev){
          var next=Object.assign({},prev);
          var vkeys=Object.keys(updated);
          for(var i=0;i<vkeys.length;i++){
            var v=vkeys[i];

            for(var j=0;j<rnums.length;j++){
              next[rk(v,rnums[j])]=updated[v][rnums[j]];
            }
          }
          return next;
        });
        var fv=Object.keys(updated)[0];

      }catch(err){setCsvMsg("解析失敗: "+err.message);}

  }

  function makeRR(text){
    var cursor=0;
    return function(label,opts){
      var allowDash=opts&&opts.allowDash;
      var i=text.indexOf(label,cursor);if(i===-1)return null;
      var pos=i+label.length,seg=text.slice(pos);
      var re=allowDash?/-?(?:\d+\.\d+|\.\d+)|[-−ー]|\d+/g:/-?(?:\d+\.\d+|\.\d+|\d+)/g;
      var vals=[],m,lastEnd=0;
      while(vals.length<6&&(m=re.exec(seg))){
        if(allowDash&&/^[-−ー]$/.test(m[0]))vals.push(null);else vals.push(Number(m[0]));
        lastEnd=re.lastIndex;
      }
      if(vals.length<6)return null;
      cursor=pos+lastEnd;return vals;
    };
  }

  // 「ラベル 値」という1行から、値（テキストそのまま）を取り出す（風・天候・波高など単一値のフィールド用）
  function parseSingleLine(text,label){
    var lines=text.split("\n");
    for(var i=0;i<lines.length;i++){
      var l=lines[i].trim();
      if(l.indexOf(label+" ")===0){
        return l.slice(label.length+1).trim();
      }
    }
    return null;
  }

  function applyStTbl(table,period,cur){
    var row=table[period],ns=Object.assign({},cur.sts);
    if(row)for(var b=1;b<=6;b++){var v=row[b-1];if(v!=null&&v>=0&&v<=0.6)ns[b]=Math.min(0.4,v).toFixed(2);}
    var nf=Object.assign({},cur.fSts),f=table["F持"];
    if(f)for(var b=1;b<=6;b++){var v=f[b-1];nf[b]=(v!=null&&v>=0&&v<=0.6)?Math.min(0.4,v).toFixed(2):"";}
    return{sts:ns,fSts:nf};
  }

  function parseAll(){
    var text=rd.pText,results=[],newData={};
    try{
      var table={};
      for(var i=0;i<STPS.length;i++){
        var lb=STPS[i],idx=text.indexOf(lb);
        if(idx===-1){table[lb]=null;continue;}
        var seg=text.slice(idx+lb.length),re=/\d+\.\d+|\.\d+|[-−ー]/g,vals=[],m;
        while(vals.length<6&&(m=re.exec(seg)))vals.push(/^[-−ー]$/.test(m[0])?null:Number(m[0]));
        table[lb]=vals.length===6?vals:null;
      }
      var fi=text.indexOf("F持");
      if(fi!==-1){var seg=text.slice(fi+2),re=/\d+\.\d+|\.\d+|[-−ー]/g,vals=[],m;while(vals.length<6&&(m=re.exec(seg)))vals.push(/^[-−ー]$/.test(m[0])?null:Number(m[0]));table["F持"]=vals.length===6?vals:null;}
      var hasAny=false;for(var i=0;i<STPS.length;i++){if(table[STPS[i]])hasAny=true;}
      if(hasAny){var ap=applyStTbl(table,stPeriod,rd);newData.stTable=table;newData.sts=ap.sts;newData.fSts=ap.fSts;results.push("平均ST");}
    }catch(e){}
    try{
      var rr=makeRR(text);rr("番号");rr("ランク");rr("貢献P");
      var rateRow=rr("勝率"),ren2Row=rr("2連対率"),ren3Row=rr("3連対率");
      if(rateRow||ren2Row){
        var nm={};
        for(var b=1;b<=6;b++){var i=b-1;nm[b]={rate:rateRow&&rateRow[i]>=0&&rateRow[i]<=10?rateRow[i]:null,ren2:ren2Row&&ren2Row[i]>=0&&ren2Row[i]<=100?ren2Row[i]:null,ren3:ren3Row&&ren3Row[i]>=0&&ren3Row[i]<=100?ren3Row[i]:null};}
        newData.motors=nm;results.push("モーター");
      }
    }catch(e){}
    updateRd(function(prev){
      var n=Object.assign({},prev,newData);
      n.pMsg=results.length===0?"データが見つかりませんでした":"✓ "+results.join("・")+"を読み取りました";
      return n;
    });
  }

  function parseTenji(){
    var text=rd.tenjiText;
    try{
      var rr=makeRR(text);
      var shinnyu=rr("進入",{allowDash:true});
      var tenjiRow=rr("展示",{allowDash:true});
      var isshuRow=rr("周回",{allowDash:true});
      var mawariRow=rr("周り足",{allowDash:true});
      var chokusenRow=rr("直線",{allowDash:true});
      rr("ST",{allowDash:true});
      var weightRow=rr("体重",{allowDash:true});
      rr("調整重量",{allowDash:true});
      var tiltRow=rr("チルト",{allowDash:true});
      var tiltSet=TILT_OPT.map(Number);
      var ni=Object.assign({},rd.inputs),nt=Object.assign({},rd.tilts),nw=Object.assign({},rd.weights),nc=Object.assign({},rd.courses);
      if(tenjiRow&&isshuRow&&mawariRow){

            tenji:tenjiRow[i]>=5.5&&tenjiRow[i]<=7.8?String(tenjiRow[i]):rd.inputs[b].tenji,
            isshu:isshuRow[i]>=15&&isshuRow[i]<=45?String(isshuRow[i]):rd.inputs[b].isshu,

        if(tiltRow)for(var b=1;b<=6;b++){if(tiltRow[b-1]==null)continue;var s=(Math.round(tiltRow[b-1]*2)/2).toFixed(1);if(tiltSet.indexOf(Number(s))>=0)nt[b]=s;}
        // 風向を貼り付けテキストから自動反映（プルダウンの手動選択が不要に）
        var windLine=parseSingleLine(text,"風");

          }catch(e){oddsParsed=null;}
        }
        updateRd(function(prev){var n=Object.assign({},prev);n.inputs=ni;n.tilts=nt;n.weights=nw;n.courses=nc;n.wind=newWind;n.weather=weatherLine||prev.weather;n.waveHeight=waveLine||prev.waveHeight;n.odds3tan=oddsParsed||prev.odds3tan;n.oddsTime=oddsParsed?Date.now():prev.oddsTime;n.tenjiMsg=(windLine&&WIND[windLine])?"✓ 6艇分＋風向を読み取りました":"✓ 6艇分を読み取りました";return n;});
        return;
      }
      updateRd(function(prev){var n=Object.assign({},prev);n.tenjiMsg="タイムが見つかりません";return n;});
    }catch(e){
      updateRd(function(prev){var n=Object.assign({},prev);n.tenjiMsg="解析に失敗しました";return n;});
    }
  }

  const result=useMemo(function(){

  const slit=useMemo(function(){
    var rows=[];
    var hasManual=Object.values(rd.sts).some(function(v){return v!=="";});
    var hasCsvSt=rd.stScore&&rd.stScore.st1y&&rd.stScore.st1y.some(function(v){return v!=null;});

    }));
    if(!hasManual&&!hasCsvSt&&!hasWakuSt)return null;
    for(var b=1;b<=6;b++){
      var st=null,mark=null,n=null;
      if(rd.sts[b]!==""){
        // 手入力優先

  const aiEval=useMemo(function(){
    if(!result)return null;
    var rows=result.rows;
    var effSt={};
    for(var b=1;b<=6;b++){if(rd.sts[b]!=="")effSt[b]=rd.fHold[b]&&rd.fSts[b]!==""?parseFloat(rd.fSts[b]):parseFloat(rd.sts[b]);}
    var stVals=Object.values(effSt);
    var stAvg=stVals.length>=2?stVals.reduce(function(a,c){return a+c;},0)/stVals.length:null;
    var motorVals=[];
    for(var b=1;b<=6;b++){if(rd.motors[b]&&rd.motors[b].ren2!=null)motorVals.push(rd.motors[b].ren2);}
    var motorAvg=motorVals.length>=2?motorVals.reduce(function(a,c){return a+c;},0)/motorVals.length:null;
    var motorEntries=[];
    for(var b=1;b<=6;b++){if(rd.motors[b]&&rd.motors[b].ren2!=null)motorEntries.push([b,rd.motors[b].ren2]);}
    motorEntries.sort(function(a,b){return b[1]-a[1];});
    var motorTop2={};for(var i=0;i<Math.min(2,motorEntries.length);i++)motorTop2[motorEntries[i][0]]=true;
    var motorRank={};for(var i=0;i<motorEntries.length;i++)motorRank[motorEntries[i][0]]=i+1;

    var r1Vals=[],r3Vals=[];
    for(var b=1;b<=6;b++){
      var rr=rows.filter(function(x){return x.boat===b;})[0];
      if(rr&&rr.racerR1final!=null)r1Vals.push(rr.racerR1final);
      if(rr&&rr.racerR3final!=null)r3Vals.push(rr.racerR3final);
    }
    var r1Avg=r1Vals.length>=2?r1Vals.reduce(function(a,c){return a+c;},0)/r1Vals.length:null;
    var r3Avg=r3Vals.length>=2?r3Vals.reduce(function(a,c){return a+c;},0)/r3Vals.length:null;

    var evals=rows.map(function(r){
      var m=rd.motors[r.boat];
      var crit={
        time:r.diff>=0.1,
        motor:m&&(m.ren2!=null||m.ren3!=null)?(motorTop2[r.boat]||(m.ren3!=null&&m.ren3>=60)):null,
        wind:rd.wind==="無風"?null:r.windAdj>=0.5,
      };
      var goods=0;var critVals=Object.values(crit);for(var i=0;i<critVals.length;i++)if(critVals[i]===true)goods++;
      var mark=goods>=2?"◎":goods===1?"○":"△";
      var warns=[],plus=[];
      if(rd.fHold[r.boat])warns.push("F持ち注意");
      if(stAvg!=null&&effSt[r.boat]!=null&&effSt[r.boat]-stAvg>=0.03)warns.push("ST遅め注意");
      if(rd.tilts[r.boat]!==""&&parseFloat(rd.tilts[r.boat])>=1.0)warns.push("チルト跳ね・伸び警戒");
      if(stAvg!=null&&effSt[r.boat]!=null&&stAvg-effSt[r.boat]>=0.03)plus.push("スリット先行候補");
      var score=goods*10+(r.racerR1final!=null&&r1Avg!=null?(r.racerR1final-r1Avg)*0.3:0)+r.diff*5+(m&&m.ren2!=null&&motorAvg!=null?(m.ren2-motorAvg)*0.3:0)+r.windAdj*0.5+r.final1*0.05;
      var mRankCSV=m&&m.rank!=null?m.rank:null;
      var mRankCalc=motorRank[r.boat]||null;
      var mRank=mRankCSV!=null?mRankCSV:mRankCalc;
      return Object.assign({},r,{crit:crit,goods:goods,mark:mark,warns:warns,plus:plus,score:score,motorRank:mRank,motorRen2:m&&m.ren2!=null?m.ren2:null});
    });

    var km=rd.kimari?rd.kimari[kimariPeriod]:null;
    var b1=evals.filter(function(r){return r.boat===1;})[0];
    if(km&&b1){
      if(km.nige!=null&&km.nige>=40)b1.plus.push("逃げ率"+km.nige+"%と高水準");
      else if(km.nige!=null&&km.nige<=25)b1.warns.push("逃げ率"+km.nige+"%と低調");
      var types=[
        {key:"sashi",name:"差し",def:km.sasare,defName:"差され"},

  },[result,rd.sts,rd.fHold,rd.fSts,rd.motors,rd.tilts,rd.wind,rd.kimari,kimariPeriod]);

  const yoso=useMemo(function(){

    function sameAreaBonus(b){

    function motorScore(b){

      for(var mb=1;mb<=6;mb++){if(rd.motors[mb]&&rd.motors[mb].ren2!=null)motorVals.push(rd.motors[mb].ren2);}
      if(motorVals.length<2)return 0;

    function tenjiRankScore(b){

    var b1row=rows.filter(function(r){return r.boat===1;})[0];
    var b1r1=b1row?r1(b1row):0;

    // 1着候補を決定
    var firstCandidates=[];

    } else if(b1r1<=40){

    var honmei=fc[0]?fc[0].boat:null;

    (function(){

    // スジ舟券テーブル（スクショ版）

      1:{

        nige2:   {p2:[3,4,5,6],p3:[]},     // 2遅れる

    function getMainKimari(boatRow){

      var personalKim=rd.kimari&&rd.kimari["直近1年"]?rd.kimari["直近1年"]:rd.kimari&&rd.kimari["直近6ヶ月"]?rd.kimari["直近6ヶ月"]:null;

          sashi:personalKim.sashi&&personalKim.sashi[ci]!=null?personalKim.sashi[ci]:0,

    var nagashi2=honmei?place2.filter(function(r){return r.boat!==honmei;}).slice(0,3).map(function(r){return honmei+"-"+r.boat;}):[];

          var mySt=rd.stScore&&rd.stScore.st1y?rd.stScore.st1y[myB-1]:null;
          var inSt=rd.stScore&&rd.stScore.st1y?rd.stScore.st1y[inB-1]:null;
          var tOk=!isNaN(myT)&&!isNaN(inT)&&(inT-myT)>=0.1;
          var sOk=mySt==null||inSt==null||(inSt-mySt)>=0.5;
          if(tOk&&sOk)ssaBoats.push(r.boat);
        }
      }
    });

    // 6点予想生成（1着固定、2着x3着上位から重複なし6点）
    // 表示形式: 1-23-345
    // maxN点の買目生成（1着固定）
    function makeBet(axis,maxN){
      if(!axis)return{text:"",count:0};
      var p2c=[].concat(p2top,p2mid,p2rest).filter(function(b){return b!==axis;});
      var p3c=[].concat(p3top,p3mid,p3rest).filter(function(b){return b!==axis;});
      var used2={},used3={},count=0;
      for(var i=0;i<p2c.length&&count<maxN;i++){
        for(var j=0;j<p3c.length&&count<maxN;j++){
          if(p2c[i]!==p3c[j]){used2[p2c[i]]=1;used3[p3c[j]]=1;count++;}

                                  <span style={{fontSize:13,fontWeight:700,color:"#8ad0ff",letterSpacing:"0.03em"}}>{t[0]}-{t[1]}-{t[2]}</span>
                                  {o!=null&&!isNaN(o)&&<span style={{fontSize:10,fontWeight:700,color:"#f9c513"}}>{o}倍</span>}
                                  {!inBase&&<span style={{fontSize:9,fontWeight:700,color:"#8ad0ff"}}>NEW</span>}
                                </span>
                              );
                            })}
                          </div>
                          <div style={{fontSize:9,color:"#6b7a8c",marginTop:4}}>青枠＋NEW＝ベース型の買い目には無い組番（バランス型が新たに拾っている分）</div>
                          {rd.odds3tan&&ai1chakuBalancedSynthOdds!=null&&(
                            <div style={{marginTop:6,fontSize:11,color:"#9db5cc"}}>
                              合成オッズ：<span style={{color:"#f9c513",fontWeight:800,fontSize:13}}>{ai1chakuBalancedSynthOdds.toFixed(1)}倍</span>
                              <span style={{color:"#8b9bae",fontSize:9,marginLeft:6}}>（{ai1chakuBalanced.bet.length}点均等買いの想定払戻倍率）</span>
                            </div>
                          )}
                        </div>
                      )}
                      <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #2a2140"}}>
                        <div style={{fontSize:11,fontWeight:800,color:"#c9a8ff",marginBottom:6}}>🖥️ finalize_bet.py 実行コマンドをコピー</div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                          <input type="text" placeholder="日付 YYYY-MM-DD" value={fbRaceDate}
                            onChange={function(e){setFbRaceDate(e.target.value);}}
                            style={{width:130,fontSize:11,padding:"4px 6px",borderRadius:4,border:"1px solid #3a3060",background:"#0e1b2c",color:"#e6ecf4"}}/>
                          <input type="text" placeholder="CSVパス（{DATE}が日付に置換されます）" value={fbRaceCsvPath}
                            onChange={function(e){setFbRaceCsvPath(e.target.value);}}
                            style={{flex:1,minWidth:220,fontSize:11,padding:"4px 6px",borderRadius:4,border:"1px solid #3a3060",background:"#0e1b2c",color:"#e6ecf4"}}/>
                          <input type="number" placeholder="秒" value={fbBufferSec}
                            onChange={function(e){setFbBufferSec(e.target.value);}}
                            style={{width:60,fontSize:11,padding:"4px 6px",borderRadius:4,border:"1px solid #3a3060",background:"#0e1b2c",color:"#e6ecf4"}}/>
                        </div>
                        {fbCommand?(
                          <div>
                            <textarea readOnly value={fbCommand} onClick={function(e){e.target.select();}}
                              rows={3}
                              style={{width:"100%",boxSizing:"border-box",fontSize:10,color:"#8b9bae",background:"#0e1b2c",borderRadius:6,padding:"6px 8px",fontFamily:"monospace",border:"1px solid #3a3060",resize:"vertical"}}/>
                            <div style={{fontSize:9,color:"#8b9bae",marginTop:2}}>↑クリックで全選択されます（Ctrl+Cで手動コピー可）</div>
                            <button onClick={copyFbCommand} style={{marginTop:6,fontSize:11,fontWeight:700,color:"#0e1b2c",background:"#c9a8ff",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer"}}>
                              コマンドをコピー
                            </button>
                            {fbCopyMsg&&<span style={{marginLeft:8,fontSize:10,color:fbCopyMsg.indexOf("✓")===0?"#5dd39e":"#ff9b9b"}}>{fbCopyMsg}</span>}
                          </div>
                        ):(
                          <div style={{fontSize:10,color:"#8b9bae"}}>日付を入力するとコマンドが生成されます</div>
                        )}
                      </div>
                    </div>
                  )}
                  {combinedBet&&(
                    <div style={{marginTop:10,background:"#16273c",borderRadius:8,padding:"10px 12px",border:"1px solid #3d7a5a"}}>
                      <div style={{fontSize:11,fontWeight:800,color:"#5dd39e",marginBottom:4}}>🔗 V2＋AI1着%基準フォーメーション 合成買い目（重複除外）</div>
                      <div style={{fontSize:11,color:"#b3bdcc",marginBottom:6,lineHeight:1.5}}>
                        両方式が選んだ組番を1点にまとめて合算。47日実績（精度分析ログ追記79）では、単体（V2:37.2%/127.7%、AI1着%:30.5%/128.3%）に対し、
                        合成で的中率48.8%・回収率126.1%（重複部分だけで見ると回収率137.5%と最も優秀）。的中率を優先したい場合向け。
                      </div>
                      <div style={{fontSize:10,color:"#9db5cc",marginBottom:4}}>
                        V2 {combinedBet.v2Count}点 + AI1着% {combinedBet.ai1Count}点 − 重複{combinedBet.overlapCount}点 ＝ <span style={{color:"#5dd39e",fontWeight:700}}>{combinedBet.bet.length}点</span>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {compressFormation(combinedBet.bet).map(function(g,gi){
                          return (
                            <span key={gi} style={{display:"inline-flex",alignItems:"center",gap:6,background:"#0e1b2c",borderRadius:6,padding:"5px 10px"}}>
                              <span style={{fontSize:13,fontWeight:700,color:"#5dd39e",letterSpacing:"0.03em"}}>{g.text}</span>
                              {g.type==="formation"&&<span style={{fontSize:9,color:"#8b9bae"}}>（{g.n}点）</span>}
                            </span>
                          );
                        })}
                      </div>
                      {rd.odds3tan?(
                        combinedSynthOdds!=null?(
                          <div style={{marginTop:8,fontSize:11,color:"#9db5cc"}}>
                            合成オッズ：<span style={{color:"#f9c513",fontWeight:800,fontSize:13}}>{combinedSynthOdds.toFixed(1)}倍</span>
                            <span style={{color:"#8b9bae",fontSize:9,marginLeft:6}}>（{combinedBet.bet.length}点均等買いの想定払戻倍率）</span>
                          </div>
                        ):(
                          <div style={{marginTop:8,fontSize:10,color:"#8b9bae"}}>買い目の一部のオッズが未取得のため合成オッズを算出できません</div>
                        )
                      ):(
                        <div style={{marginTop:8,fontSize:10,color:"#8b9bae"}}>オッズ未取得（オッズ取得後に合成オッズを表示）</div>
                      )}
                    </div>
                  )}
                  {axisPickRowsByBoat&&(
                    <div style={{marginTop:10,background:"#16273c",borderRadius:8,padding:"10px 12px",border:"1px solid #2c4762"}}>
                      <div style={{fontSize:15,fontWeight:800,color:"#fff",marginBottom:4,lineHeight:1.4}}>６x６択チャレンジ！<br/>てめぇらの力で勝ち取ってみろコノヤロー！ダァー！</div>
                      <div style={{fontSize:11,color:"#b3bdcc",marginBottom:8,lineHeight:1.5}}>
                        任意の艇を1着と仮定した出目候補をAI着率順に表示します。
                      </div>
                      <div style={{display:"flex",gap:6,marginBottom:10}}>
                        <button onClick={function(){setAxisPickMode("2tan");}}
                          style={{padding:"5px 12px",borderRadius:6,border:axisPickMode==="2tan"?"2px solid #5dd39e":"1px solid #2c4762",background:axisPickMode==="2tan"?"#1a3b2e":"#0e1b2c",color:axisPickMode==="2tan"?"#5dd39e":"#9db5cc",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                          2連単
                        </button>
                        <button onClick={function(){setAxisPickMode("3tan");}}
                          style={{padding:"5px 12px",borderRadius:6,border:axisPickMode==="3tan"?"2px solid #c9a8ff":"1px solid #2c4762",background:axisPickMode==="3tan"?"#2a1f45":"#0e1b2c",color:axisPickMode==="3tan"?"#c9a8ff":"#9db5cc",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                          3連単
                        </button>
                        {axisPickMode==="3tan"&&(
                          <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:6}}>
                            <button onClick={function(){setAxisPickN(function(v){return Math.max(1,v-1);});}} style={{width:26,height:26,borderRadius:6,border:"1px solid #2c4762",background:"#0e1b2c",color:"#c9a8ff",fontWeight:800,cursor:"pointer"}}>－</button>
                            <span style={{fontSize:12,color:"#c9a8ff",fontWeight:700,minWidth:36,textAlign:"center"}}>{axisPickN}点</span>
                            <button onClick={function(){setAxisPickN(function(v){return Math.min(20,v+1);});}} style={{width:26,height:26,borderRadius:6,border:"1px solid #2c4762",background:"#0e1b2c",color:"#c9a8ff",fontWeight:800,cursor:"pointer"}}>＋</button>
                          </div>
                        )}
                      </div>
                      <div style={{display:"flex",gap:6,marginBottom:10}}>
                        {[1,2,3,4,5,6].map(function(b){
                          var isSel=axisPickBoat===b;
                          var aiP1v=axisPickRowsByBoat[b]&&axisPickRowsByBoat[b].aiP1;
                          return (
                            <div key={b} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                              <button onClick={function(){setAxisPickBoat(isSel?null:b);}}
                                style={{width:36,height:36,borderRadius:8,border:isSel?"2px solid #fff":"1px solid #2c4762",background:isSel?LANE[b].bg:"#0e1b2c",color:isSel?LANE[b].fg:"#9db5cc",fontWeight:800,fontSize:15,cursor:"pointer"}}>
                                {b}
                              </button>
                              <span style={{fontSize:9,fontWeight:700,color:aiP1v!=null?(aiP1v>=45?"#f9c513":"#7db4e8"):"#8b9bae"}}>
                                {aiP1v!=null?aiP1v+"%":"―"}
                              </span>
                            </div>
                          );
                        })}
                      </div>
                      {axisPickMode==="2tan"&&axisPickBoat&&axisPickCombos&&axisPickCombos.length>0&&(
                        <div>
                          <div style={{fontSize:10,color:"#9db5cc",marginBottom:4}}>{axisPickBoat}号艇が1着と仮定した場合の2連単・全{axisPickCombos.length}通り（AI2着率順）</div>
                          <div style={{fontSize:9,color:"#8b9bae",marginBottom:8,lineHeight:1.4}}>
                            競艇の控除率は券種を問わず一律25%のため、「合成オッズ」（3着を残り4艇全通りにした場合の3連単合成オッズ）は目安ではなく、2連単オッズの理論上の推定値そのものです。実際の2連単オッズと見比べて食い違いが大きい場合、割安な方を選ぶ判断材料になります。
                          </div>
                          <table style={{borderCollapse:"collapse",fontSize:11,width:"100%",tableLayout:"fixed"}}>
                            <tbody>
                              <tr>
                                <td style={{padding:"3px 2px",color:"#8b9bae",fontSize:9,width:"15%"}}>2着艇</td>
                                {axisPickCombos.map(function(c,ti){
                                  return <td key={ti} style={{padding:"3px 2px",textAlign:"center",fontWeight:800,fontSize:13,color:ti===0?"#f9c513":"#7db4e8"}}>{c.boat}</td>;
                                })}
                              </tr>
                              <tr>
                                <td style={{padding:"3px 2px",color:"#8b9bae",fontSize:9,borderTop:"1px solid #2c4762"}}>AI2着率</td>
                                {axisPickCombos.map(function(c,ti){
                                  return <td key={ti} style={{padding:"3px 2px",textAlign:"center",fontWeight:700,fontSize:11,color:"#5dd39e",borderTop:"1px solid #2c4762"}}>{c.aiP2!=null?c.aiP2+"%":"―"}</td>;
                                })}
                              </tr>
                              <tr>
                                <td style={{padding:"3px 2px",color:"#8b9bae",fontSize:9,borderTop:"1px solid #2c4762"}}>合成オッズ</td>
                                {axisPickCombos.map(function(c,ti){
                                  var remaining4=[1,2,3,4,5,6].filter(function(b){return b!==axisPickBoat&&b!==c.boat;});
                                  var combos3=remaining4.map(function(k){return [axisPickBoat,c.boat,k];});
                                  var synth3=rd.odds3tan?synthesizeOdds(combos3,rd.odds3tan):null;
                                  var label=rd.odds3tan?(synth3!=null?synth3.toFixed(1)+"倍":"一部未取得"):"未取得";
                                  return <td key={ti} style={{padding:"3px 1px",textAlign:"center",fontWeight:700,color:synth3!=null?"#c9a8ff":"#8b9bae",borderTop:"1px solid #2c4762",fontSize:synth3!=null?11:8}}>{label}</td>;
                                })}
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      )}
                      {axisPickMode==="3tan"&&axisPickBoat&&axisPickCombos&&axisPickCombos.length>0&&(
                        <div>
                          <div style={{fontSize:10,color:"#9db5cc",marginBottom:4}}>{axisPickBoat}号艇が1着と仮定した場合の出目候補（上位{axisPickCombos.length}点、スコア順）</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                            {axisPickCombos.map(function(t,ti){
                              var key=t[0]+"-"+t[1]+"-"+t[2];
                              var o=rd.odds3tan&&rd.odds3tan[key];
                              return (
                                <span key={ti} style={{display:"inline-flex",alignItems:"center",gap:6,background:"#0e1b2c",borderRadius:6,padding:"5px 10px"}}>
                                  <span style={{fontSize:13,fontWeight:700,color:ti===0?"#f9c513":"#c9a8ff",letterSpacing:"0.03em"}}>{t[0]}-{t[1]}-{t[2]}</span>
                                  {o!=null&&!isNaN(o)&&<span style={{fontSize:10,fontWeight:700,color:"#f9c513"}}>{o}倍</span>}
                                </span>
                              );
                            })}
                          </div>
                          {(function(){
                            var synth=rd.odds3tan?synthesizeOdds(axisPickCombos,rd.odds3tan):null;
                            if(!rd.odds3tan)return <div style={{marginTop:8,fontSize:10,color:"#8b9bae"}}>オッズ未取得（オッズ取得後に合成オッズを表示）</div>;
                            if(synth==null)return <div style={{marginTop:8,fontSize:10,color:"#8b9bae"}}>買い目の一部のオッズが未取得のため合成オッズを算出できません</div>;
                            return (
                              <div style={{marginTop:8,fontSize:11,color:"#9db5cc"}}>
                                合成オッズ：<span style={{color:"#f9c513",fontWeight:800,fontSize:13}}>{synth.toFixed(1)}倍</span>
                                <span style={{color:"#8b9bae",fontSize:9,marginLeft:6}}>（{axisPickCombos.length}点均等買いの想定払戻倍率）</span>
                              </div>
                            );
                          })()}
                        </div>
                      )}
                      {axisPickBoat&&(!axisPickCombos||axisPickCombos.length===0)&&(
                        <div style={{fontSize:10,color:"#8b9bae"}}>この艇の候補データが不足しているため出目を算出できません</div>
                      )}
                    </div>
                  )}
                  {SHOW_HONMEI_TAIKO_ANA&&(<>
                  {yoso.taiko4&&yoso.taiko4.count>0&&(
                    <div style={{marginTop:10}}>
                      <div style={{fontSize:11,color:"#5dd39e",marginBottom:6,fontWeight:700}}>○ 対抗</div>
                      <div style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap"}}>
                        <div>
                          <div style={{fontSize:10,color:"#9db5cc",marginBottom:3}}>{yoso.taiko}号艇 {yoso.taiko4.count}点</div>
                          <span style={{background:"#0e1b2c",borderRadius:6,padding:"6px 14px",fontSize:16,fontWeight:800,color:"#9db5cc",letterSpacing:"0.05em"}}>{yoso.taiko4.text}</span>
                        </div>
                        {yoso.taiko10&&yoso.taiko10.count>yoso.taiko4.count&&(
                          <div>
                            <div style={{fontSize:10,color:"#9db5cc",marginBottom:3}}>最大{yoso.taiko10.count}点</div>
                            <span style={{background:"#0e1b2c",borderRadius:6,padding:"6px 12px",fontSize:14,fontWeight:700,color:"#7db4e8",letterSpacing:"0.05em"}}>{yoso.taiko10.text}</span>
                          </div>
                        )}
                      </div>
                      {yoso.taiko2&&yoso.taiko24&&yoso.taiko24.count>0&&(
                        <div style={{marginTop:8}}>
                          <div style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap"}}>
                            <div>
                              <div style={{fontSize:10,color:"#7db4e8",marginBottom:3}}>{yoso.taiko2}号艇（僅差） {yoso.taiko24.count}点</div>
                              <span style={{background:"#0e1b2c",borderRadius:6,padding:"6px 14px",fontSize:16,fontWeight:800,color:"#7db4e8",letterSpacing:"0.05em"}}>{yoso.taiko24.text}</span>
                            </div>
                            {yoso.taiko210&&yoso.taiko210.count>yoso.taiko24.count&&(
                              <div>
                                <div style={{fontSize:10,color:"#9db5cc",marginBottom:3}}>最大{yoso.taiko210.count}点</div>
                                <span style={{background:"#0e1b2c",borderRadius:6,padding:"6px 12px",fontSize:14,fontWeight:700,color:"#7db4e8",letterSpacing:"0.05em",opacity:0.8}}>{yoso.taiko210.text}</span>
                              </div>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                  {yoso.anaBeat!==yoso.honmei&&yoso.ana4&&yoso.ana4.count>0&&(
                    <div style={{marginTop:10}}>
                      <div style={{fontSize:11,color:"#ff8a80",marginBottom:6,fontWeight:700}}>🎲 穴（{yoso.anaBeat}号艇1着）</div>
                      <div style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap"}}>
                        <div>
                          <div style={{fontSize:10,color:"#9db5cc",marginBottom:3}}>{yoso.ana4.count}点</div>
                          <span style={{background:"#0e1b2c",borderRadius:6,padding:"6px 14px",fontSize:16,fontWeight:800,color:"#ff8a80",letterSpacing:"0.05em"}}>{yoso.ana4.text}</span>
                        </div>
                        {yoso.ana10&&yoso.ana10.count>yoso.ana4.count&&(
                          <div>
                            <div style={{fontSize:10,color:"#9db5cc",marginBottom:3}}>最大{yoso.ana10.count}点</div>
                            <span style={{background:"#0e1b2c",borderRadius:6,padding:"6px 12px",fontSize:14,fontWeight:700,color:"#ff8a80",letterSpacing:"0.05em",opacity:0.8}}>{yoso.ana10.text}</span>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                                    {yoso.anaBeat===yoso.honmei&&(
                    <div style={{marginTop:10}}>
                      <div style={{fontSize:11,color:"#ff8a80",marginBottom:6,fontWeight:700}}>🎲 穴</div>
                      {yoso.nukemeA&&(
                        <div style={{marginBottom:6}}>
                          <div style={{fontSize:10,color:"#9db5cc",marginBottom:2}}>3着抜け目</div>
                          <span style={{background:"#0e1b2c",borderRadius:6,padding:"6px 14px",fontSize:16,fontWeight:800,color:"#ff8a80",letterSpacing:"0.05em"}}>{yoso.nukemeA}</span>
                        </div>
                      )}
                    </div>
                  )}
                  </>)}
                </div>
              </div>
            )}
                  {yoso&&yoso.motorB1Boats&&yoso.motorB1Boats.length>0&&(
                    <div style={{marginTop:10}}>
                      <div style={{fontSize:11,color:"#c084fc",marginBottom:6,fontWeight:700}}>
                        ⚙ モーターB1軸（{yoso.motorB1Boats.map(function(b){return b+"号艇";}).join("・")}）
                      </div>
                      {yoso.motorB1Bets.map(function(bet,i){
                        var b1boat=yoso.motorB1Boats[i];
                        return (
                          <div key={i} style={{marginBottom:8}}>
                            {bet.b1&&bet.b1.count>0&&(
                              <div style={{marginBottom:4}}>
                                <div style={{fontSize:10,color:"#9db5cc",marginBottom:2}}>{b1boat}号艇1着固定 {bet.b1.count}点</div>
                                <span style={{background:"#0e1b2c",borderRadius:6,padding:"6px 14px",fontSize:16,fontWeight:800,color:"#c084fc",letterSpacing:"0.05em"}}>{bet.b1.text}</span>
                              </div>
                            )}
                            {bet.b2&&bet.b2.count>0&&(
                              <div style={{marginBottom:4}}>
                                <div style={{fontSize:10,color:"#9db5cc",marginBottom:2}}>{b1boat}号艇を2着に {bet.b2.count}点</div>
                                <span style={{background:"#0e1b2c",borderRadius:6,padding:"6px 14px",fontSize:16,fontWeight:800,color:"#c084fc",letterSpacing:"0.05em"}}>{bet.b2.text}</span>
                              </div>
                            )}
                            {bet.b3&&bet.b3.count>0&&(
                              <div>
                                <div style={{fontSize:10,color:"#9db5cc",marginBottom:2}}>{b1boat}号艇を3着に {bet.b3.count}点</div>
                                <span style={{background:"#0e1b2c",borderRadius:6,padding:"6px 14px",fontSize:16,fontWeight:800,color:"#c084fc",opacity:0.8,letterSpacing:"0.05em"}}>{bet.b3.text}</span>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App /></ErrorBoundary>);

</script>
</body>
</html>
